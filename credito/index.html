<!DOCTYPE html>
<html lang="es" data-theme="light" style="color-scheme: light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Credito | Holistic Marketing</title>
  <style>
    .hm-report-calendar-wrap input[type="date"]:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.2); background: #fff; }
    .hm-report-calendar-wrap input[type="date"]::-webkit-calendar-picker-indicator { opacity: .7; cursor: pointer; }
  </style>
  <script src="/api/auth-config?v=20260428api"></script>
  <script>
    (function () {
      var DEBUG = true;
      var VERSION = "credito-bootstrap-20260427d";
      var panel;

      function ensurePanel() {
        if (!DEBUG || panel) return;
        panel = document.createElement("pre");
        panel.id = "credito-debug-panel";
        panel.style.cssText = [
          "position:fixed","left:8px","right:8px","bottom:8px","max-height:34vh","overflow:auto",
          "padding:10px","margin:0","z-index:99999","background:rgba(15,23,42,.96)","color:#e2e8f0",
          "font:12px/1.35 monospace","border:1px solid #334155","border-radius:8px","white-space:pre-wrap"
        ].join(";");
        if (document.body) document.body.appendChild(panel);
      }
      function write(line) {
        if (!DEBUG) return;
        ensurePanel();
        if (panel) panel.textContent += line + "\n";
        console.log(line);
      }
      function send(level, event, detail) {
        try {
          fetch("/api/client-log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ route: "/credito", level: level, event: event, detail: detail || null })
          }).catch(function () {});
        } catch (_) {}
      }
      function parseHashSession() {
        if (!location.hash || location.hash.length < 2) return null;
        var params = new URLSearchParams(location.hash.slice(1));
        var at = params.get("access_token");
        var rt = params.get("refresh_token");
        if (!at || !rt) return null;
        return { access_token: at, refresh_token: rt };
      }
      function extractSessionFromStorageValue(raw) {
        if (!raw) return null;
        try {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.access_token && parsed.refresh_token) return parsed;
          if (parsed && parsed.currentSession && parsed.currentSession.access_token && parsed.currentSession.refresh_token) return parsed.currentSession;
          if (Array.isArray(parsed) && parsed.length && parsed[0] && parsed[0].access_token && parsed[0].refresh_token) return parsed[0];
        } catch (_) {}
        return null;
      }
      function findStoredSession() {
        try {
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i) || "";
            if (k.indexOf("sb-") === 0 && k.indexOf("-auth-token") > 0) {
              var v = localStorage.getItem(k);
              var s = extractSessionFromStorageValue(v);
              if (s) return { key: k, session: s };
            }
          }
        } catch (_) {}
        return null;
      }
      function storageKeyFor(url) {
        try {
          var ref = new URL(url).hostname.split(".")[0];
          return ref ? "sb-" + ref + "-auth-token" : undefined;
        } catch (_) {
          return undefined;
        }
      }
      function loadSupabaseUmd() {
        return new Promise(function (resolve, reject) {
          if (window.supabase && window.supabase.createClient) return resolve();
          var s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
          s.async = true;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error("No se pudo cargar supabase-js UMD")); };
          document.head.appendChild(s);
        });
      }
      function loadCreditoApp() {
        var s = document.createElement("script");
        s.type = "module";
        s.crossOrigin = "anonymous";
        s.src = "/credito-app/credito-app.js?v=20260427d";
        document.head.appendChild(s);
      }

      write("[credito] version=" + VERSION);
      write("[credito] boot path=" + location.pathname + " hash=" + (location.hash ? "yes" : "no"));
      write("[credito] auth-config present=" + (!!window.__SUPABASE_URL__ && !!window.__SUPABASE_ANON_KEY__));

      (async function bootstrapCredito() {
        var src = "none";
        try {
          var fromHash = parseHashSession();
          var fromStore = findStoredSession();
          write("[credito] session hash=" + (!!fromHash) + " storage=" + (!!fromStore));
          if (!window.__SUPABASE_URL__ || !window.__SUPABASE_ANON_KEY__) {
            send("error", "missing-config", { hasUrl: !!window.__SUPABASE_URL__, hasAnon: !!window.__SUPABASE_ANON_KEY__ });
            return;
          }
          if (!fromHash && !fromStore) {
            send("info", "no-session-found", { hasHash: !!fromHash, hasStorageSession: !!fromStore });
            return;
          }
          await loadSupabaseUmd();
          var opts = {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false, storage: localStorage }
          };
          var sk = storageKeyFor(window.__SUPABASE_URL__);
          if (sk) opts.auth.storageKey = sk;
          var sb = window.supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON_KEY__, opts);
          if (fromHash) {
            src = "hash";
            await sb.auth.setSession(fromHash);
            history.replaceState(null, "", location.pathname + location.search);
          } else if (fromStore && fromStore.session) {
            src = "storage";
            await sb.auth.setSession({
              access_token: fromStore.session.access_token,
              refresh_token: fromStore.session.refresh_token
            });
          }
          write("[credito] session hydrated from " + src);
          send("info", "session-hydrated", { source: src });
        } catch (err) {
          var msg = err && err.message ? err.message : String(err);
          write("[credito] hydrate error: " + msg);
          send("error", "session-hydrate-error", { message: msg, source: src });
        } finally {
          loadCreditoApp();
        }
      })();
    })();
  </script>
  <link rel="stylesheet" crossorigin href="/credito-app/credito-app.css?v=20260427d">
  <link rel="icon" type="image/png" href="/credito-app/favicon/favicon.png?v=2" />
  <link rel="shortcut icon" type="image/png" href="/credito-app/favicon/favicon.png?v=2" />
</head>

  <div id="root"></div>
</body>
</html>
