<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nueva contraseña | Hecom Club</title>
<link rel="icon" type="image/png" href="/imagenes/favicon.png?v=2">
<link rel="apple-touch-icon" href="/imagenes/favicon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
<style>
:root {
    --brand-start: #ff5733;
    --brand-mid: #ff8c42;
    --brand-end: #ffb347;
    --brand-gradient: linear-gradient(90deg, var(--brand-start) 0%, var(--brand-mid) 52%, var(--brand-end) 100%);
    --brand-gradient-panel: linear-gradient(145deg, #ff4f2e 0%, #ff7a35 38%, #ffa62e 72%, #ffc966 100%);
    --primary: #e85a24;
    --primary-soft: rgba(255, 87, 51, 0.12);
    --text: #111827;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --input-bg: #ffffff;
    --radius-sm: 8px;
    --panel-right-text: rgba(255, 255, 255, 0.96);
    --panel-right-muted: rgba(255, 255, 255, 0.82);
    --font-display: 'Varela Round', 'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    color: var(--text);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
.page { display: flex; min-height: 100dvh; width: 100%; }
.panel-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 48px 48px;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    position: relative;
}
.back-link {
    position: absolute;
    top: 24px;
    left: 24px;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.back-link:hover { color: var(--primary); text-decoration: none; }
.brand-logo {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin: 0 auto 30px;
    line-height: 0;
}
.brand-logo img {
    height: auto;
    max-height: 200px;
    width: auto;
    max-width: min(98%, 640px);
    object-fit: contain;
    object-position: center center;
}
.form-title {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 4vw, 1.75rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
}
.form-sub {
    font-size: 0.9375rem;
    color: var(--text-muted);
    margin-bottom: 26px;
    line-height: 1.55;
}
.field-group { margin-bottom: 22px; }
.field-label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
}
.input-wrap { position: relative; display: flex; align-items: center; }
.input-wrap .input-icon {
    position: absolute;
    left: 14px;
    width: 20px;
    height: 20px;
    color: #9ca3af;
    pointer-events: none;
    flex-shrink: 0;
}
.input-wrap input {
    width: 100%;
    padding: 13px 14px 13px 44px;
    font-family: inherit;
    font-size: 0.9375rem;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrap input::placeholder { color: #9ca3af; }
.input-wrap input:hover { border-color: #d1d5db; }
.input-wrap input:focus {
    border-color: var(--brand-start);
    box-shadow: 0 0 0 3px var(--primary-soft);
}
.input-wrap.has-toggle input { padding-right: 48px; }
.toggle-pass {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s, background 0.2s;
}
.toggle-pass:hover { color: var(--text); background: #f3f4f6; }
.submit-btn {
    width: 100%;
    padding: 14px 20px;
    min-height: 48px;
    font-family: var(--font-display);
    font-size: 0.9375rem;
    font-weight: 700;
    color: #fff;
    background: var(--brand-gradient);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(255, 87, 51, 0.35);
    margin-bottom: 18px;
}
.submit-btn:hover:not(:disabled) {
    filter: brightness(0.96) saturate(1.05);
    box-shadow: 0 6px 22px rgba(255, 87, 51, 0.42);
}
.submit-btn:active:not(:disabled) { transform: scale(0.99); }
.submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }
.back-to-login {
    display: block;
    text-align: center;
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--primary);
}
.status-msg {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-size: 0.8125rem;
    font-weight: 500;
    display: none;
    line-height: 1.45;
}
.status-msg.visible { display: block; }
.status-msg.info {
    background: rgba(255, 179, 71, 0.12);
    border: 1px solid rgba(255, 87, 51, 0.22);
    color: var(--text);
}
.status-msg.error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
}
.panel-right {
    flex: 1;
    background: var(--brand-gradient-panel);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    position: relative;
    overflow: hidden;
}
.panel-right::before {
    content: '';
    position: absolute;
    width: 120%;
    height: 120%;
    left: 50%;
    top: 45%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, transparent 55%);
    pointer-events: none;
}
.hero-illustration { position: relative; z-index: 1; width: min(100%, 160px); margin-bottom: 28px; color: rgba(255,255,255,0.95); }
.hero-illustration svg { width: 100%; height: auto; display: block; }
.hero-title {
    position: relative;
    z-index: 1;
    font-family: var(--font-display);
    font-size: clamp(1.2rem, 3vw, 1.45rem);
    font-weight: 700;
    text-align: center;
    color: var(--panel-right-text);
    max-width: 280px;
    line-height: 1.35;
    margin-bottom: 10px;
}
.hero-sub {
    position: relative;
    z-index: 1;
    font-size: 0.9rem;
    text-align: center;
    color: var(--panel-right-muted);
    max-width: 260px;
    line-height: 1.5;
}
@media (max-width: 960px) {
    html, body { font-size: 16px; }
    .page { flex-direction: column; min-height: 100dvh; min-height: 100svh; }
    .panel-left {
        max-width: none;
        width: 100%;
        margin: 0;
        justify-content: flex-start;
        min-height: 0;
        flex: 1 1 auto;
        padding-top: max(5.5rem, calc(env(safe-area-inset-top, 0px) + 3.25rem));
        padding-right: max(1.25rem, env(safe-area-inset-right, 0px));
        padding-bottom: max(1.75rem, env(safe-area-inset-bottom, 0px));
        padding-left: max(1.25rem, env(safe-area-inset-left, 0px));
        order: 1;
    }
    .back-link {
        top: max(0.75rem, env(safe-area-inset-top, 0px));
        left: max(0.75rem, env(safe-area-inset-left, 0px));
        padding: 0.5rem 0.65rem;
        min-height: 44px;
        min-width: 44px;
        align-items: center;
        font-size: 0.9375rem;
    }
    .brand-logo { margin-top: 0.25rem; margin-bottom: 1.35rem; }
    .brand-logo img {
        max-height: min(28vw, 118px);
        max-width: min(88vw, 300px);
    }
    .panel-right {
        order: 2;
        flex: 0 0 auto;
        padding: 1.75rem max(1.25rem, env(safe-area-inset-right, 0px))
            max(2rem, env(safe-area-inset-bottom, 0px)) max(1.25rem, env(safe-area-inset-left, 0px));
    }
}
@media (max-width: 480px) {
    .submit-btn, .input-wrap input { font-size: 16px; }
    .submit-btn { min-height: 50px; padding: 15px 20px; }
    .input-wrap input { padding-top: 14px; padding-bottom: 14px; padding-left: 46px; }
    .input-wrap.has-toggle input { padding-right: 50px; }
    .brand-logo img {
        max-height: min(26vw, 104px);
        max-width: min(86vw, 280px);
    }
}
</style>
</head>
<body>
<div class="page">
    <section class="panel-left" aria-labelledby="reset-heading">
        <a class="back-link" href="/login">← Iniciar sesión</a>

        <div>
            <a class="brand-logo" href="https://www.marketingconholistic.com/" rel="noopener noreferrer" aria-label="Holistic Marketing — sitio web">
                <img src="/imagenes/logo-holistic-marketing.png?v=1" alt="holistic marketing" width="640" height="186">
            </a>

            <h1 class="form-title" id="reset-heading">Nueva contraseña</h1>
            <p class="form-sub">Elige una contraseña segura. Si el enlace caducó, vuelve a pedir recuperación desde iniciar sesión.</p>

            <p class="status-msg error" id="noSessionMsg" style="display:none" role="alert"></p>

            <form id="resetForm" novalidate style="display:none">
                <div class="field-group">
                    <label class="field-label" for="password">Nueva contraseña</label>
                    <div class="input-wrap has-toggle">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres" required minlength="8">
                        <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar u ocultar contraseña">
                            <svg id="iconEyeOff" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            <svg id="iconEye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="password2">Confirmar contraseña</label>
                    <div class="input-wrap has-toggle">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password2" autocomplete="new-password" placeholder="Repite la contraseña" required minlength="8">
                        <button type="button" class="toggle-pass" id="togglePass2" aria-label="Mostrar u ocultar confirmación">
                            <svg id="iconEyeOff2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            <svg id="iconEye2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Guardar contraseña</button>
                <a class="back-to-login" href="/forgot-password">Pedir otro enlace</a>

                <p class="status-msg info" id="statusInfo" role="status"></p>
                <p class="status-msg error" id="statusError" role="alert"></p>
            </form>
        </div>
    </section>

    <aside class="panel-right" aria-hidden="true">
        <div class="hero-illustration">
            <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="52" stroke="currentColor" stroke-opacity="0.25" stroke-width="1.5"/>
                <rect x="42" y="52" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2.2" fill="rgba(255,255,255,0.12)"/>
                <path d="M52 52V46a8 8 0 0 1 16 0v6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
        <h2 class="hero-title">Contraseña actualizada</h2>
        <p class="hero-sub">Usa una clave larga y única para esta cuenta.</p>
    </aside>
</div>

<script type="module">
import { getSupabaseClient } from '/js/supabase-auth.js';

var form = document.getElementById('resetForm');
var btn = document.getElementById('submitBtn');
var info = document.getElementById('statusInfo');
var err = document.getElementById('statusError');
var noSessionMsg = document.getElementById('noSessionMsg');
var pass = document.getElementById('password');
var pass2 = document.getElementById('password2');

function hideMsgs() {
    info.classList.remove('visible');
    err.classList.remove('visible');
    info.textContent = '';
    err.textContent = '';
}

function wireToggle(toggleId, inputEl, iconOffId, iconOnId) {
    var t = document.getElementById(toggleId);
    var iconOff = document.getElementById(iconOffId);
    var iconOn = document.getElementById(iconOnId);
    t.addEventListener('click', function () {
        var show = inputEl.type === 'password';
        inputEl.type = show ? 'text' : 'password';
        iconOff.style.display = show ? 'none' : 'block';
        iconOn.style.display = show ? 'block' : 'none';
    });
}
wireToggle('togglePass', pass, 'iconEyeOff', 'iconEye');
wireToggle('togglePass2', pass2, 'iconEyeOff2', 'iconEye2');

async function init() {
    try {
        var supabase = await getSupabaseClient();
        var session = null;
        var { data } = await supabase.auth.getSession();
        session = data.session;

        if (!session) {
            await new Promise(function (r) { setTimeout(r, 400); });
            var d2 = await supabase.auth.getSession();
            session = d2.data.session;
        }

        supabase.auth.onAuthStateChange(function (event, sess) {
            if (event === 'PASSWORD_RECOVERY' || (sess && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED'))) {
                noSessionMsg.style.display = 'none';
                form.style.display = 'block';
            }
        });

        if (session) {
            form.style.display = 'block';
            noSessionMsg.style.display = 'none';
            noSessionMsg.classList.remove('visible');
        } else {
            noSessionMsg.textContent = 'Enlace inválido o caducado. Pide un nuevo correo desde «¿Olvidaste tu contraseña?».';
            noSessionMsg.style.display = 'block';
            form.style.display = 'none';
        }
    } catch (ex) {
        noSessionMsg.textContent = ex.message || 'No se pudo comprobar la sesión.';
        noSessionMsg.style.display = 'block';
        form.style.display = 'none';
    }
}

init();

form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideMsgs();
    var p1 = pass.value;
    var p2 = pass2.value;
    if (p1.length < 8) {
        err.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        err.classList.add('visible');
        return;
    }
    if (p1 !== p2) {
        err.textContent = 'Las contraseñas no coinciden.';
        err.classList.add('visible');
        return;
    }
    btn.disabled = true;
    try {
        var supabase = await getSupabaseClient();
        var result = await supabase.auth.updateUser({ password: p1 });
        if (result.error) {
            err.textContent = result.error.message || 'No se pudo actualizar.';
            err.classList.add('visible');
            return;
        }
        info.textContent = 'Contraseña actualizada. Redirigiendo al inicio de sesión…';
        info.classList.add('visible');
        setTimeout(function () { window.location.href = '/login'; }, 1200);
    } catch (ex) {
        err.textContent = ex.message || 'Error de conexión.';
        err.classList.add('visible');
    } finally {
        btn.disabled = false;
    }
});
</script>
</body>
</html>
