<!DOCTYPE html>
<html lang="es" data-theme="light" style="color-scheme: light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Crédito | Holistic Marketing</title>
  <style>
    .hm-report-calendar-wrap input[type="date"]:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.2); background: #fff; }
    .hm-report-calendar-wrap input[type="date"]::-webkit-calendar-picker-indicator { opacity: .7; cursor: pointer; }
  </style>
  <script src="/credito-app/auth-config.js"></script>
  <script>
    (function () {
      console.log("[credito] boot", { path: location.pathname, hasHash: !!location.hash });
      console.log("[credito] auth-config", {
        supabaseUrl: window.__SUPABASE_URL__ || null,
        hasAnon: !!window.__SUPABASE_ANON_KEY__,
      });

      window.addEventListener("error", function (ev) {
        var t = ev && ev.target;
        if (t && t.tagName) {
          console.error("[credito] resource error", {
            tag: t.tagName,
            src: t.src || t.href || null,
          });
        }
      }, true);

      fetch("/api/supabase-config", { credentials: "same-origin" })
        .then(function (r) {
          console.log("[credito] /api/supabase-config status", r.status);
          return r.text().then(function (txt) {
            console.log("[credito] /api/supabase-config body", txt.slice(0, 300));
          });
        })
        .catch(function (err) {
          console.error("[credito] /api/supabase-config fetch error", err && err.message ? err.message : err);
        });
    })();
  </script>
  <script type="module" crossorigin src="/credito-app/credito-app.js"></script>
  <link rel="stylesheet" crossorigin href="/credito-app/credito-app.css">
<link rel="icon" type="image/png" href="/credito-app/favicon/favicon.png?v=2" /><link rel="shortcut icon" type="image/png" href="/credito-app/favicon/favicon.png?v=2" /></head>
<body style="margin:0;min-height:100%;background:#f5f3ee">
  <div id="root"></div>
</body>
</html>
