<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Credito | Holistic Marketing</title>
  <script src="/credito-app/auth-config.js?v=20260427n"></script>
  <script>
    (function () {
      var VERSION = "credito-preflight-20260427n";
      var DEBUG = (window.location.search || "").indexOf("debug=1") >= 0;
      var panel = null;
      function ensurePanel() {
        if (!DEBUG || panel) return;
        panel = document.createElement("pre");
        panel.id = "credito-debug-panel";
        panel.style.cssText = "position:fixed;left:8px;right:8px;bottom:8px;max-height:34vh;overflow:auto;padding:10px;margin:0;z-index:99999;background:rgba(15,23,42,.96);color:#e2e8f0;font:12px/1.35 monospace;border:1px solid #334155;border-radius:8px;white-space:pre-wrap";
        if (document.body) document.body.appendChild(panel);
        else document.documentElement.appendChild(panel);
      }
      function logInfo(event, detail) {
        if (!DEBUG) return;
        try {
          ensurePanel();
          var line = "[credito] " + event + (detail ? " " + JSON.stringify(detail) : "");
          if (panel) panel.textContent += line + "\n";
          console.log(line);
        } catch (_) {}
      }
      function sendClientLog(level, event, detail) {
        try {
          fetch("/api/client-log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              route: "/credito",
              level: level || "info",
              event: event,
              detail: detail || null
            })
          }).catch(function () {});
        } catch (_) {}
      }
      function logError(event, detail) {
        try {
          console.error("[credito]", event, detail || "");
        } catch (_) {}
        sendClientLog("error", event, detail);
      }
      function installFetchTrace() {
        if (window.__CREDITO_FETCH_TRACE__) return;
        window.__CREDITO_FETCH_TRACE__ = true;
        var origFetch = window.fetch;
        if (!origFetch) return;
        window.fetch = async function (input, init) {
          var url = "";
          try { url = typeof input === "string" ? input : (input && input.url) ? String(input.url) : ""; } catch (_) {}
          var method = (init && init.method) ? String(init.method).toUpperCase() : "GET";
          try {
            var res = await origFetch.apply(this, arguments);
            var interesting =
              /supabase\.co\/(auth|rest|functions)\/v1/i.test(url) ||
              /\/rest\/v1\//i.test(url) ||
              /gerentes|clientes_acceso|clientes|cobranza|credito/i.test(url);
            if (interesting && (DEBUG || res.status >= 400)) {
              logInfo("fetch", { method: method, url: url.slice(0, 220), status: res.status });
            }
            if (interesting && res.status >= 400) {
              sendClientLog("error", "fetch-error", { method: method, url: url.slice(0, 220), status: res.status });
            }
            return res;
          } catch (err) {
            var msg = err && err.message ? err.message : String(err);
            logError("fetch-exception", { method: method, url: url.slice(0, 220), message: msg });
            throw err;
          }
        };
      }
      function installXhrTrace() {
        if (window.__CREDITO_XHR_TRACE__) return;
        window.__CREDITO_XHR_TRACE__ = true;
        var OrigXhr = window.XMLHttpRequest;
        if (!OrigXhr) return;
        function TracedXhr() {
          var xhr = new OrigXhr();
          var method = "GET";
          var url = "";
          var open = xhr.open;
          xhr.open = function (m, u) {
            method = String(m || "GET").toUpperCase();
            url = String(u || "");
            return open.apply(xhr, arguments);
          };
          xhr.addEventListener("loadend", function () {
            try {
              var interesting =
                /supabase\.co\/(auth|rest|functions)\/v1/i.test(url) ||
                /\/rest\/v1\//i.test(url) ||
                /gerentes|clientes_acceso|clientes|cobranza|credito/i.test(url);
              if (interesting && (DEBUG || xhr.status >= 400)) {
                logInfo("xhr", { method: method, url: url.slice(0, 220), status: xhr.status });
              }
              if (interesting && xhr.status >= 400) {
                sendClientLog("error", "xhr-error", { method: method, url: url.slice(0, 220), status: xhr.status });
              }
            } catch (_) {}
          });
          return xhr;
        }
        window.XMLHttpRequest = TracedXhr;
      }
      function parseHashSession() {
        var h = window.location.hash || "";
        if (!h) return null;
        var p = new URLSearchParams(h.slice(1));
        var at = p.get("access_token");
        var rt = p.get("refresh_token");
        return at && rt ? { access_token: at, refresh_token: rt } : null;
      }
      function storageKeyForSupabaseUrl(url) {
        try {
          var ref = new URL(url).hostname.split(".")[0];
          return ref ? "sb-" + ref + "-auth-token" : null;
        } catch (_) {
          return null;
        }
      }
      function persistSessionForApp(session) {
        try {
          if (!session) return null;
          var key = storageKeyForSupabaseUrl(window.__SUPABASE_URL__);
          if (!key) return null;
          // Compatibilidad: algunas builds leen sesión directa, otras currentSession.
          localStorage.setItem(key, JSON.stringify(session));
          localStorage.setItem(key + ":wrapped", JSON.stringify({
            currentSession: session,
            expiresAt: session.expires_at || null
          }));
          return key;
        } catch (_) {
          return null;
        }
      }
      function injectSessionHash(session) {
        try {
          if (!session || !session.access_token || !session.refresh_token) return false;
          var now = Math.round(Date.now() / 1000);
          var expAt = session.expires_at != null ? Math.floor(Number(session.expires_at)) : NaN;
          var expiresIn = !isNaN(expAt) ? Math.max(30, expAt - now) : 3600;
          var tokenType = (session.token_type || "bearer").toLowerCase();
          var hash = [
            "access_token=" + encodeURIComponent(session.access_token),
            "expires_in=" + encodeURIComponent(String(expiresIn)),
            "refresh_token=" + encodeURIComponent(session.refresh_token),
            "token_type=" + encodeURIComponent(tokenType),
            "type=magiclink"
          ];
          if (session.expires_at != null) hash.push("expires_at=" + encodeURIComponent(String(session.expires_at)));
          history.replaceState(null, "", location.pathname + location.search + "#" + hash.join("&"));
          setTimeout(function () {
            try {
              if (!detectLoginScreen()) {
                history.replaceState(null, "", location.pathname + location.search);
              }
            } catch (_) {}
          }, 20000);
          return true;
        } catch (_) {
          return false;
        }
      }
      function detectLoginScreen() {
        try {
          var txt = (document.body && document.body.innerText) ? document.body.innerText : "";
          return /Iniciar sesi[oó]n/i.test(txt) && (/Enviar enlace al correo/i.test(txt) || /Correo electr[oó]nico/i.test(txt));
        } catch (_) {
          return false;
        }
      }
      function rewriteDashboardUrl(inputUrl) {
        try {
          var u = new URL(String(inputUrl || ""), window.location.origin);
          var p = u.pathname || "";
          if (p === "/dashboard" || p.indexOf("/dashboard/") === 0 || p === "/credito/dashboard" || p.indexOf("/credito/dashboard/") === 0) {
            return "/credito" + (u.search || "") + (u.hash || "");
          }
          return null;
        } catch (_) {
          return null;
        }
      }
      function installDashboardRouteGuard() {
        if (window.__CREDITO_ROUTE_GUARD__) return;
        window.__CREDITO_ROUTE_GUARD__ = true;
        try {
          var origPush = history.pushState;
          history.pushState = function (state, title, url) {
            var rewritten = rewriteDashboardUrl(url);
            if (rewritten) {
              logInfo("route-guard-push", { from: String(url || ""), to: rewritten });
              return origPush.call(history, state, title, rewritten);
            }
            return origPush.apply(history, arguments);
          };
        } catch (_) {}
        try {
          var origReplaceState = history.replaceState;
          history.replaceState = function (state, title, url) {
            var rewritten = rewriteDashboardUrl(url);
            if (rewritten) {
              logInfo("route-guard-replace", { from: String(url || ""), to: rewritten });
              return origReplaceState.call(history, state, title, rewritten);
            }
            return origReplaceState.apply(history, arguments);
          };
        } catch (_) {}
        try {
          var origAssign = window.location.assign.bind(window.location);
          window.location.assign = function (url) {
            var rewritten = rewriteDashboardUrl(url);
            if (rewritten) {
              logInfo("route-guard-assign", { from: String(url || ""), to: rewritten });
              return origAssign(rewritten);
            }
            return origAssign(url);
          };
        } catch (_) {}
        try {
          var origReplace = window.location.replace.bind(window.location);
          window.location.replace = function (url) {
            var rewritten = rewriteDashboardUrl(url);
            if (rewritten) {
              logInfo("route-guard-location-replace", { from: String(url || ""), to: rewritten });
              return origReplace(rewritten);
            }
            return origReplace(url);
          };
        } catch (_) {}
        try {
          document.addEventListener("click", function (ev) {
            var node = ev.target;
            while (node && node !== document.body) {
              if (node.tagName === "A" && node.getAttribute) {
                var href = node.getAttribute("href");
                var rewritten = rewriteDashboardUrl(href);
                if (rewritten) {
                  ev.preventDefault();
                  ev.stopPropagation();
                  logInfo("route-guard-click", { from: String(href || ""), to: rewritten });
                  window.location.replace(rewritten);
                  return;
                }
                break;
              }
              node = node.parentElement;
            }
          }, true);
        } catch (_) {}
      }
      function monitorPostLoad(session) {
        var checks = 0;
        var timer = setInterval(function () {
          checks += 1;
          var isLogin = detectLoginScreen();
          logInfo("postload-check", { n: checks, login: isLogin });
          if (isLogin) {
            tryRecoverIfLoginScreen(session);
          }
          if (checks >= 8) clearInterval(timer);
        }, 1000);
      }
      function tryRecoverIfLoginScreen(session) {
        try {
          if (!session) return;
          if (!detectLoginScreen()) return;
          var onceKey = "credito_force_recover_once";
          if (sessionStorage.getItem(onceKey) === "1") return;
          sessionStorage.setItem(onceKey, "1");
          var injected = injectSessionHash(session);
          sendClientLog("error", "forced-recover-login-screen", { injected: !!injected });
          var next = "/credito" + location.search + location.hash;
          logInfo("forced-recover-reload", { to: next, injected: !!injected });
          location.replace(next);
        } catch (_) {}
      }
      function loadSupabaseUmd() {
        return new Promise(function (resolve, reject) {
          if (window.supabase && window.supabase.createClient) return resolve();
          var s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
          s.async = true;
          s.onload = resolve;
          s.onerror = function () { reject(new Error("umd load failed")); };
          document.head.appendChild(s);
        });
      }
      function redirectLogin(reason) {
        logInfo("redirect-login", { reason: reason, version: VERSION });
        var redirect = encodeURIComponent("/credito");
        window.location.replace("/login?redirect=" + redirect);
      }
      async function preflight() {
        installFetchTrace();
        installXhrTrace();
        installDashboardRouteGuard();
        logInfo("version", { v: VERSION, debug: DEBUG });
        logInfo("config", { hasUrl: !!window.__SUPABASE_URL__, hasAnon: !!window.__SUPABASE_ANON_KEY__ });
        try {
          var p = window.location.pathname || "";
          if (p === "/dashboard" || p.indexOf("/dashboard/") === 0 || p === "/credito/dashboard" || p.indexOf("/credito/dashboard/") === 0) {
            var canonical = "/credito" + window.location.search + window.location.hash;
            history.replaceState(null, "", canonical);
            logInfo("canonical-route", { from: p, to: canonical });
          }
        } catch (_) {}
        if (!window.__SUPABASE_URL__ || !window.__SUPABASE_ANON_KEY__) return redirectLogin("missing-config");
        var fromHash = parseHashSession();
        logInfo("session-source", { hash: !!fromHash });
        try {
          await loadSupabaseUmd();
          var sb = window.supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON_KEY__, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false, storage: localStorage }
          });
          var currentSession = (await sb.auth.getSession()).data.session;
          logInfo("initial-session", { ok: !!currentSession });
          if (!currentSession && fromHash) {
            await sb.auth.setSession(fromHash);
            history.replaceState(null, "", location.pathname + location.search);
            logInfo("set-session", { source: "hash" });
            currentSession = (await sb.auth.getSession()).data.session;
          }
          var session = currentSession;
          logInfo("get-session", { ok: !!session });
          if (!session) {
            sendClientLog("error", "preflight-no-session", { version: VERSION });
            return redirectLogin("no-session");
          }
          var persistedKey = persistSessionForApp(session);
          logInfo("session-persisted", { key: persistedKey || "(none)" });
          var injected = injectSessionHash(session);
          logInfo("session-hash-injected", { ok: injected });
          var userRes = await sb.auth.getUser();
          var ok = !!(userRes && userRes.data && userRes.data.user);
          logInfo("get-user", { ok: ok, error: userRes && userRes.error ? userRes.error.message : null });
          if (!ok) {
            sendClientLog("error", "preflight-invalid-user", { version: VERSION, error: userRes && userRes.error ? userRes.error.message : null });
          }
          window.__CREDITO_PREFLIGHT_SESSION__ = session;
        } catch (e) {
          logError("preflight-error", { message: e && e.message ? e.message : String(e) });
          return redirectLogin("preflight-error");
        }
        var app = document.getElementById("credito-app-script");
        if (app) {
          app.onload = function () {
            logInfo("app-loaded", { src: app.getAttribute("src") || null });
            setTimeout(function () {
              tryRecoverIfLoginScreen(window.__CREDITO_PREFLIGHT_SESSION__ || null);
            }, 900);
            setTimeout(function () {
              tryRecoverIfLoginScreen(window.__CREDITO_PREFLIGHT_SESSION__ || null);
            }, 2200);
            monitorPostLoad(window.__CREDITO_PREFLIGHT_SESSION__ || null);
          };
          app.onerror = function () { logError("app-load-error", { src: app.getAttribute("src") || null, version: VERSION }); };
          app.setAttribute("src", "/credito-app/credito-app.js?v=20260427m");
        }
      }
      window.addEventListener("error", function (ev) {
        logError("window-error", { message: ev && ev.message ? ev.message : "unknown" });
      });
      window.addEventListener("unhandledrejection", function (ev) {
        try {
          var reason = ev && ev.reason ? (ev.reason.message || String(ev.reason)) : "unknown";
          logError("unhandled-rejection", { reason: reason });
        } catch (_) {}
      });
      preflight();
    })();
  </script>
