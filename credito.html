<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Credito | Holistic Marketing</title>
  <script src="/credito-app/auth-config.js?v=20260427k"></script>
  <script>
    (function () {
      var VERSION = "credito-preflight-20260427l";
      function sendClientLog(level, event, detail) {
        try {
          fetch("/api/client-log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              route: "/credito",
              level: level || "info",
              event: event,
              detail: detail || null
            })
          }).catch(function () {});
        } catch (_) {}
      }
      function logError(event, detail) {
        try {
          console.error("[credito]", event, detail || "");
        } catch (_) {}
        sendClientLog("error", event, detail);
      }
      function parseHashSession() {
        var h = window.location.hash || "";
        if (!h) return null;
        var p = new URLSearchParams(h.slice(1));
        var at = p.get("access_token");
        var rt = p.get("refresh_token");
        return at && rt ? { access_token: at, refresh_token: rt } : null;
      }
      function findStoredSession() {
        try {
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i) || "";
            if (k.indexOf("sb-") === 0 && k.indexOf("-auth-token") > 0) {
              var raw = localStorage.getItem(k) || "";
              var obj = JSON.parse(raw);
              if (obj && obj.access_token && obj.refresh_token) return obj;
              if (obj && obj.currentSession && obj.currentSession.access_token && obj.currentSession.refresh_token) return obj.currentSession;
            }
          }
        } catch (_) {}
        return null;
      }
      function loadSupabaseUmd() {
        return new Promise(function (resolve, reject) {
          if (window.supabase && window.supabase.createClient) return resolve();
          var s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
          s.async = true;
          s.onload = resolve;
          s.onerror = function () { reject(new Error("umd load failed")); };
          document.head.appendChild(s);
        });
      }
      function redirectLogin(reason) {
        sendClientLog("info", "redirect-login", { reason: reason, version: VERSION });
        var redirect = encodeURIComponent("/credito");
        window.location.replace("/login?redirect=" + redirect);
      }
      async function preflight() {
        if (!window.__SUPABASE_URL__ || !window.__SUPABASE_ANON_KEY__) return redirectLogin("missing-config");
        var fromHash = parseHashSession();
        var fromStore = findStoredSession();
        if (!fromHash && !fromStore) return redirectLogin("no-session");
        try {
          await loadSupabaseUmd();
          var sb = window.supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON_KEY__, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false, storage: localStorage }
          });
          if (fromHash) {
            await sb.auth.setSession(fromHash);
            history.replaceState(null, "", location.pathname + location.search);
          } else {
            await sb.auth.setSession({ access_token: fromStore.access_token, refresh_token: fromStore.refresh_token });
          }
          var userRes = await sb.auth.getUser();
          var ok = !!(userRes && userRes.data && userRes.data.user);
          if (!ok) return redirectLogin("invalid-session");
        } catch (e) {
          logError("preflight-error", { message: e && e.message ? e.message : String(e) });
          return redirectLogin("preflight-error");
        }
        var app = document.getElementById("credito-app-script");
        if (app) {
          app.onload = function () { sendClientLog("info", "app-loaded", { src: app.getAttribute("src") || null, version: VERSION }); };
          app.onerror = function () { logError("app-load-error", { src: app.getAttribute("src") || null, version: VERSION }); };
          app.setAttribute("src", "/credito-app/credito-app.js?v=20260427l");
        }
      }
      window.addEventListener("error", function (ev) {
        logError("window-error", { message: ev && ev.message ? ev.message : "unknown" });
      });
      window.addEventListener("unhandledrejection", function (ev) {
        try {
          var reason = ev && ev.reason ? (ev.reason.message || String(ev.reason)) : "unknown";
          logError("unhandled-rejection", { reason: reason });
        } catch (_) {}
      });
      preflight();
    })();
  </script>
  <link rel="stylesheet" href="/credito-app/credito-app.css?v=20260427l" />
  <link rel="icon" type="image/png" href="/credito-app/favicon/favicon.png?v=3" />
  <link rel="shortcut icon" type="image/png" href="/credito-app/favicon/favicon.png?v=3" />
</head>
<body style="margin:0;min-height:100%;background:#f5f3ee">
  <div id="root"></div>
  <script id="credito-app-script" type="module" crossorigin></script>
</body>
</html>
