<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder | Hecom Club</title>
<link rel="icon" type="image/png" href="/imagenes/favicon.png?v=2">
<link rel="apple-touch-icon" href="/imagenes/favicon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --cyan:#00c4bf; --cyan-bright:#00d9d3; --pink:#e8003e; --pink-soft:#ff1a5c;
    --dark:#0f1114; --bg:#fafbfd; --card:#ffffff; --card-border:#e8eaf0;
    --text:#0f1114; --text-body:#3d4152; --muted:#7c8094;
    --gradient:linear-gradient(135deg,var(--cyan) 0%,var(--pink) 100%);
    --shadow-md:0 4px 20px rgba(15,17,20,0.06),0 1px 4px rgba(15,17,20,0.04);
    --shadow-xl:0 24px 64px rgba(15,17,20,0.1),0 8px 24px rgba(15,17,20,0.05);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
}
.aurora{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(140px);opacity:.55}
.aurora-blob:nth-child(1){width:520px;height:520px;background:rgba(0,196,191,.08);top:-15%;left:-8%}
.aurora-blob:nth-child(2){width:420px;height:420px;background:rgba(232,0,62,.05);bottom:-12%;right:-5%}
.fine-grid{position:fixed;inset:0;z-index:-1;opacity:.03;
    background-image:linear-gradient(rgba(0,196,191,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(0,196,191,.25) 1px,transparent 1px);
    background-size:80px 80px;
    mask-image:radial-gradient(ellipse at 50% 30%,#000 20%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse at 50% 30%,#000 20%,transparent 70%)}

.site-header{
    padding:20px 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}
.site-header .back{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:.88rem;
    font-weight:600;
    color:var(--muted);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:color .2s ease;
}
.site-header .back:hover{color:var(--cyan)}
.site-header .back svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.logo a{display:inline-block;line-height:0}
.logo-img{height:64px;width:auto;max-width:280px;object-fit:contain}

main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px 48px;
}
.login-shell{width:100%;max-width:420px}
.login-card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:24px;
    padding:40px 36px 36px;
    box-shadow:var(--shadow-xl);
    position:relative;
    overflow:hidden;
}
.login-card::before{
    content:'';
    position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--gradient);
}
.login-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:.72rem;
    font-weight:800;
    letter-spacing:2.5px;
    text-transform:uppercase;
    background:var(--gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:12px;
}
.login-title{
    font-family:'Bricolage Grotesque',sans-serif;
    font-size:1.75rem;
    font-weight:800;
    letter-spacing:-.5px;
    margin-bottom:8px;
    color:var(--dark);
}
.login-sub{color:var(--text-body);font-size:.95rem;margin-bottom:28px}

.field{margin-bottom:20px}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--dark);margin-bottom:8px}
.field input{
    width:100%;
    padding:14px 16px;
    border:1px solid var(--card-border);
    border-radius:12px;
    font-family:inherit;
    font-size:1rem;
    color:var(--dark);
    background:#fff;
    transition:border-color .2s ease,box-shadow .2s ease;
}
.field input::placeholder{color:var(--muted);opacity:.85}
.field input:hover{border-color:rgba(0,196,191,.35)}
.field input:focus{
    outline:none;
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(0,196,191,.12);
}
.row-inline{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:24px;
}
.remember{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--text-body);cursor:pointer;user-select:none}
.remember input{width:16px;height:16px;accent-color:var(--cyan)}
.forgot{font-size:.85rem;font-weight:600;color:var(--cyan);text-decoration:none}
.forgot:hover{text-decoration:underline}

.submit-btn{
    width:100%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:16px 24px;
    border:none;
    border-radius:14px;
    font-family:inherit;
    font-size:1rem;
    font-weight:700;
    letter-spacing:.3px;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,var(--cyan),var(--pink));
    background-size:200% 200%;
    box-shadow:0 8px 28px rgba(0,196,191,.25),0 4px 12px rgba(232,0,62,.15);
    transition:transform .2s ease,box-shadow .2s ease,filter .2s ease;
}
.submit-btn:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 12px 36px rgba(0,196,191,.3),0 6px 16px rgba(232,0,62,.2);
}
.submit-btn:disabled{opacity:.72;cursor:not-allowed;transform:none}
.submit-btn svg{width:20px;height:20px}

.status-msg{
    margin-top:18px;
    padding:12px 14px;
    border-radius:12px;
    font-size:.88rem;
    font-weight:500;
    display:none;
}
.status-msg.visible{display:block}
.status-msg.info{background:rgba(0,196,191,.08);border:1px solid rgba(0,196,191,.2);color:var(--text-body)}
.status-msg.error{background:rgba(232,0,62,.06);border:1px solid rgba(232,0,62,.15);color:var(--pink)}

.login-foot{
    margin-top:28px;
    text-align:center;
    font-size:.86rem;
    color:var(--muted);
}
.login-foot a{color:var(--cyan);font-weight:600;text-decoration:none}
.login-foot a:hover{text-decoration:underline}

@media (max-width:520px){
    .site-header .back{position:static;transform:none;margin-right:auto}
    .site-header{flex-wrap:wrap;justify-content:flex-start;gap:12px}
    .logo{width:100%;text-align:center}
    .logo-img{height:52px}
    .login-card{padding:32px 22px 28px}
}
</style>
</head>
<body>
<div class="aurora"><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
<div class="fine-grid"></div>

<header class="site-header">
    <a class="back" href="/"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Volver al inicio</a>
    <div class="logo">
        <a href="/" aria-label="Hecom Club"><img class="logo-img" src="/imagenes/logoh.png?v=2" alt="Hecom Club"></a>
    </div>
</header>

<main>
    <div class="login-shell">
        <div class="login-card">
            <p class="login-badge">Área de clientes</p>
            <h1 class="login-title">Iniciar sesión</h1>
            <p class="login-sub">Accede con el correo que usaste al contratar tu cuenta de agencia.</p>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="tu@email.com" required>
                </div>
                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="row-inline">
                    <label class="remember">
                        <input type="checkbox" name="remember" id="remember">
                        Recordarme en este dispositivo
                    </label>
                    <a class="forgot" href="http://wa.me/victorminas28" target="_blank" rel="noopener noreferrer">¿Necesitas ayuda?</a>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    Entrar
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>

            <p class="status-msg info" id="statusInfo" role="status"></p>
            <p class="status-msg error" id="statusError" role="alert"></p>

            <p class="login-foot">¿Aún no tienes cuenta de agencia? <a href="/">Solicitar acceso</a></p>
        </div>
    </div>
</main>

<script>
(function(){
    var form=document.getElementById('loginForm');
    var btn=document.getElementById('submitBtn');
    var info=document.getElementById('statusInfo');
    var err=document.getElementById('statusError');

    function hideMsgs(){info.classList.remove('visible');err.classList.remove('visible');info.textContent='';err.textContent=''}

    form.addEventListener('submit',function(e){
        e.preventDefault();
        hideMsgs();
        var email=document.getElementById('email').value.trim();
        var pass=document.getElementById('password').value;
        if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
            err.textContent='Introduce un correo electrónico válido.';
            err.classList.add('visible');
            return;
        }
        if(pass.length<6){
            err.textContent='La contraseña debe tener al menos 6 caracteres.';
            err.classList.add('visible');
            return;
        }
        btn.disabled=true;
        setTimeout(function(){
            btn.disabled=false;
            info.textContent='El acceso seguro para clientes se activará en breve. Mientras tanto, escríbenos por WhatsApp desde la página principal y te ayudamos al instante.';
            info.classList.add('visible');
        },650);
    });
})();
</script>
</body>
</html>
