<!DOCTYPE html>
<html lang="es" data-theme="light" style="color-scheme: light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Credito | Holistic Marketing</title>
  <style>
    .hm-report-calendar-wrap input[type="date"]:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.2); background: #fff; }
    .hm-report-calendar-wrap input[type="date"]::-webkit-calendar-picker-indicator { opacity: .7; cursor: pointer; }
  </style>
  <script src="/credito-app/auth-config.js"></script>
  <script>
    (function () {
      var DEBUG = true;
      var panel = null;
      function ensurePanel() {
        if (!DEBUG || panel) return;
        panel = document.createElement("pre");
        panel.id = "credito-debug-panel";
        panel.style.cssText = [
          "position:fixed","left:8px","right:8px","bottom:8px","max-height:34vh","overflow:auto",
          "padding:10px","margin:0","z-index:99999","background:rgba(15,23,42,.96)","color:#e2e8f0",
          "font:12px/1.35 monospace","border:1px solid #334155","border-radius:8px","white-space:pre-wrap"
        ].join(";");
        if (document.body) document.body.appendChild(panel);
      }
      function write(line) {
        if (!DEBUG) return;
        ensurePanel();
        if (panel) panel.textContent += line + "\n";
      }
      function send(level, event, detail) {
        try {
          fetch("/api/client-log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ route: "/credito", level: level, event: event, detail: detail || null })
          }).catch(function () {});
        } catch (_) {}
      }
      write("[credito] boot path=" + location.pathname + " hash=" + (location.hash ? "yes" : "no"));
      write("[credito] auth-config supabaseUrl=" + (window.__SUPABASE_URL__ ? "ok" : "missing") + " anon=" + (!!window.__SUPABASE_ANON_KEY__));
      send("info", "boot", { hasHash: !!location.hash, hasSupabaseUrl: !!window.__SUPABASE_URL__, hasAnon: !!window.__SUPABASE_ANON_KEY__ });

      window.addEventListener("error", function (ev) {
        var t = ev && ev.target;
        if (t && t.tagName) {
          write("[credito] resource-error " + t.tagName + " " + (t.src || t.href || "unknown"));
          send("error", "resource-error", { tag: t.tagName, src: t.src || t.href || null });
        }
      }, true);

      window.addEventListener("unhandledrejection", function (ev) {
        var msg = ev && ev.reason && ev.reason.message ? ev.reason.message : String(ev && ev.reason ? ev.reason : "unknown");
        write("[credito] unhandledrejection " + msg);
        send("error", "unhandledrejection", { message: msg });
      });

      fetch("/api/supabase-config", { credentials: "same-origin" })
        .then(function (r) {
          write("[credito] /api/supabase-config status=" + r.status);
          return r.json().then(function (cfg) {
            var hasCfg = !!(cfg && cfg.url && cfg.anonKey);
            write("[credito] /api/supabase-config ok=" + hasCfg);
            send("info", "supabase-config", { status: r.status, hasConfig: hasCfg });
          });
        })
        .catch(function (err) {
          write("[credito] /api/supabase-config fetch-error " + (err && err.message ? err.message : err));
          send("error", "supabase-config-fetch-error", { message: err && err.message ? err.message : String(err) });
        });

      function parseHashSession() {
        if (!location.hash || location.hash.length < 2) return null;
        var params = new URLSearchParams(location.hash.slice(1));
        var at = params.get("access_token");
        var rt = params.get("refresh_token");
        if (!at || !rt) return null;
        return { access_token: at, refresh_token: rt };
      }

      function storageKeyFor(url) {
        try {
          var ref = new URL(url).hostname.split(".")[0];
          return ref ? "sb-" + ref + "-auth-token" : undefined;
        } catch (_) {
          return undefined;
        }
      }

      function loadSupabaseUmd() {
        return new Promise(function (resolve, reject) {
          if (window.supabase && window.supabase.createClient) return resolve();
          var s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
          s.async = true;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error("No se pudo cargar supabase-js UMD")); };
          document.head.appendChild(s);
        });
      }

      function loadCreditoApp() {
        var s = document.createElement("script");
        s.type = "module";
        s.crossOrigin = "anonymous";
        s.src = "/credito-app/credito-app.js";
        document.head.appendChild(s);
      }

      (async function bootstrapCredito() {
        try {
          var sess = parseHashSession();
          if (sess && window.__SUPABASE_URL__ && window.__SUPABASE_ANON_KEY__) {
            write("[credito] hash detectado, hidratando sesion...");
            await loadSupabaseUmd();
            var opts = {
              auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: false,
                storage: localStorage
              }
            };
            var sk = storageKeyFor(window.__SUPABASE_URL__);
            if (sk) opts.auth.storageKey = sk;
            var sb = window.supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON_KEY__, opts);
            await sb.auth.setSession(sess);
            history.replaceState(null, "", location.pathname + location.search);
            write("[credito] sesion hidratada OK");
            send("info", "hash-session-hydrated", { ok: true });
          }
        } catch (err) {
          var msg = err && err.message ? err.message : String(err);
          write("[credito] error hidratando hash: " + msg);
          send("error", "hash-session-hydrate-error", { message: msg });
        } finally {
          loadCreditoApp();
        }
      })();
    })();
  </script>
  <link rel="stylesheet" crossorigin href="/credito-app/credito-app.css">
  <link rel="icon" type="image/png" href="/credito-app/favicon/favicon.png?v=2" />
  <link rel="shortcut icon" type="image/png" href="/credito-app/favicon/favicon.png?v=2" />
</head>
<body style="margin:0;min-height:100%;background:#f5f3ee">
  <div id="root"></div>
</body>
</html>
