function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function randomDate(daysBack) {
  const d = new Date(); d.setDate(d.getDate() - Math.floor(Math.random() * daysBack));
  return d.toISOString();
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-PE', { day:'numeric', month:'short', year:'numeric' });
}
function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000);
  if (mins < 1) return 'Ahora';
  if (mins < 60) return `Hace ${mins}m`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `Hace ${hrs}h`;
  const days = Math.floor(hrs/24);
  if (days < 7) return `Hace ${days}d`;
  return formatDate(iso);
}

function createStageData() {
  const s = {};
  STAGES.forEach(st => { s[st] = { status:'pending', files:[], note:'', notes:[], reviewer:'', reviewNote:'', reviewedAt:null, deliverables:[] }; });
  return s;
}

function getProjectStage(p) {
  for (let i = STAGES.length - 1; i >= 0; i--) {
    if (p.stages[STAGES[i]].status === 'approved') {
      return i < STAGES.length - 1 ? STAGES[i+1] : STAGES[i];
    }
    if (p.stages[STAGES[i]].status !== 'pending') return STAGES[i];
  }
  return STAGES[0];
}

function getProjectProgress(p) {
  let done = 0;
  STAGES.forEach(s => { if (p.stages[s].status === 'approved') done++; });
  return done;
}

function isProjectComplete(p) {
  return p.stages.entrega.status === 'approved';
}

var ENTREGA_RETENTION_MS = 7 * 24 * 60 * 60 * 1000;

function computeEntregaEnteredAtForTransition(prevStages, newStages, prevEntregaEnteredAt) {
  var prevStage = getProjectStage({ stages: prevStages });
  var newStage = getProjectStage({ stages: newStages });
  if (newStage === 'entrega') {
    if (prevStage !== 'entrega') return new Date().toISOString();
    return prevEntregaEnteredAt || null;
  }
  return null;
}

function backfillEntregaEnteredAtIfMissing() {
  if (!supabase) return Promise.resolve();
  var nowIso = new Date().toISOString();
  var need = [];
  D.projects.forEach(function(p) {
    if (getProjectStage(p) === 'entrega' && !p.entregaEnteredAt) need.push(p);
  });
  if (need.length === 0) return Promise.resolve();
  return Promise.all(need.map(function(p) {
    return supabase.from('creativos_proyectos').update({ entrega_entered_at: nowIso }).eq('id', p.id);
  })).then(function(results) {
    var bad = results.some(function(r) { return r.error; });
    if (bad) window._hmDebugWarn('[Creativos] backfill entrega_entered_at:', results);
    else need.forEach(function(p) { p.entregaEnteredAt = nowIso; });
  });
}

function purgeExpiredEntregaProjects() {
  if (!supabase) return Promise.resolve();
  var cutoff = Date.now() - ENTREGA_RETENTION_MS;
  var ids = [];
  D.projects.forEach(function(p) {
    if (getProjectStage(p) === 'entrega' && p.entregaEnteredAt) {
      var t = new Date(p.entregaEnteredAt).getTime();
      if (!isNaN(t) && t <= cutoff) ids.push(p.id);
    }
  });
  if (ids.length === 0) return Promise.resolve();
  return Promise.all(ids.map(function(id) {
    return supabase.from('creativos_proyectos').delete().eq('id', id);
  })).then(function(results) {
    var bad = results.filter(function(r) { return r.error; });
    if (bad.length) window._hmDebugWarn('[Creativos] purge entrega:', bad);
    else if (ids.length > 0) {
      showToast('info', 'Se eliminaron automáticamente ' + ids.length + ' proyecto(s) con más de 7 días en Entrega final.');
    }
    return loadCreativosData();
  }).then(function(data) {
    if (data) {
      D.clients = data.clients;
      D.products = data.products;
      D.editors = data.editors;
      D.projects = data.projects;
    }
  });
}

/**
 * Editores en Creativos = gerentes (Pendientes · Asistencia), enlazados por gerente_id (si existe en BD) y por email.
 * Incluye asignaciones históricas sin gerente coincidente si aún tienen proyectos.
 */
function mergeCreativosEditorsWithGerentes(gerentesList, creativosEditoresRows, proyectoRows) {
  var rows = creativosEditoresRows || [];
  var byEmail = {};
  var byGerenteId = {};
  rows.forEach(function(r) {
    var em = (r.email || '').trim().toLowerCase();
    if (em) byEmail[em] = r;
    if (r.gerente_id) byGerenteId[r.gerente_id] = r;
  });
  var gerenteEmails = {};
  var seenCreativosIds = {};
  var editors = [];
  (gerentesList || []).forEach(function(g) {
    var email = (g.email || '').trim();
    if (!email) return;
    var key = email.toLowerCase();
    gerenteEmails[key] = true;
    var parts = [g.nombre, g.apellido].filter(function(x) { return x && String(x).trim(); }).map(function(x) { return String(x).trim(); });
    var disp = parts.join(' ');
    if (!disp) disp = email.split('@')[0] || email;
    var match = (g.id && byGerenteId[g.id]) || byEmail[key];
    if (match) {
      seenCreativosIds[match.id] = true;
      editors.push({
        id: match.id,
        name: disp,
        email: email,
        specialty: match.specialty || 'Equipo',
        gerenteId: g.id,
        fromGerente: true,
        createdAt: match.created_at
      });
    } else {
      editors.push({
        id: 'gerente:' + g.id,
        gerenteId: g.id,
        name: disp,
        email: email,
        specialty: 'Equipo / asistencia',
        pendingCreativosEditor: true,
        fromGerente: true,
        createdAt: g.created_at
      });
    }
  });
  editors.sort(function(a, b) {
    var an = (a.name || '').toLowerCase();
    var bn = (b.name || '').toLowerCase();
    if (an !== bn) return an < bn ? -1 : 1;
    return (a.email || '').localeCompare(b.email || '');
  });
  var editorIdsInProjects = {};
  (proyectoRows || []).forEach(function(r) {
    if (r.editor_id) editorIdsInProjects[r.editor_id] = true;
  });
  rows.forEach(function(r) {
    if (seenCreativosIds[r.id]) return;
    if (r.gerente_id && byGerenteId[r.gerente_id] && byGerenteId[r.gerente_id].id === r.id) {
      var stillInList = (gerentesList || []).some(function(g) { return g.id === r.gerente_id; });
      if (stillInList) return;
    }
    var em = (r.email || '').trim().toLowerCase();
    if (em && gerenteEmails[em]) return;
    if (!editorIdsInProjects[r.id]) return;
    editors.push({
      id: r.id,
      name: r.name || r.email || 'Editor',
      email: r.email || '',
      specialty: r.specialty || 'Histórico',
      legacyEditor: true,
      createdAt: r.created_at
    });
  });
  return editors;
}

/* ============================================
   LOAD FROM SUPABASE (Fase 3)
   ============================================ */
function loadCreativosData() {
  if (!supabase) return Promise.resolve(null);
  return Promise.all([
    supabase.from('clientes').select('id, name, biz, emails').order('name'),
    supabase.from('creativos_clientes').select('*').order('name'),
    supabase.from('creativos_productos').select('*').order('name'),
    supabase.from('creativos_editores').select('*').order('name'),
    supabase.from('creativos_proyectos').select('*').order('created_at', { ascending: false }),
    supabase.from('gerentes').select('id, email, nombre, apellido, created_at').order('email')
  ]).then(function(ress) {
    var creditoRes = ress[0], cRes = ress[1], pRes = ress[2], eRes = ress[3], projRes = ress[4], gerentesRes = ress[5];
    if (cRes.error || pRes.error || eRes.error || projRes.error) throw new Error(cRes.error?.message || pRes.error?.message || eRes.error?.message || projRes.error?.message);
    if (gerentesRes.error) window._hmDebugWarn('[Creativos] No se pudo cargar gerentes (asistencia):', gerentesRes.error.message);
    if (creditoRes.error) window._hmDebugWarn('[Creativos] No se pudo cargar clientes de Crédito (sync):', creditoRes.error.message, '- Se muestran solo clientes de Creativos.');
    var creditoById = {};
    (creditoRes.data || []).forEach(function(c) {
      var firstEmail = (c.emails && (Array.isArray(c.emails) ? c.emails[0] : (typeof c.emails === 'string' ? c.emails : null))) || '';
      creditoById[c.id] = { name: c.name || '', company: (c.biz || '').trim(), email: firstEmail };
    });
    var clients = (cRes.data || []).map(function(r) {
      var credito = r.credito_client_id ? creditoById[r.credito_client_id] : null;
      return {
        id: r.id,
        name: credito ? credito.name : (r.name || ''),
        company: credito ? credito.company : (r.company || ''),
        email: credito ? credito.email : (r.email || ''),
        phone: r.phone || '',
        contactName: r.contact_name || '',
        notes: r.notes || '',
        creditoClientId: r.credito_client_id || null,
        createdAt: r.created_at
      };
    });
    window._hmDebugLog('[Creativos] Clientes: Crédito=', (creditoRes.data || []).length, ', creativos_clientes=', (cRes.data || []).length, ', listado final=', clients.length);
    var products = (pRes.data || []).map(function(r) { return { id: r.id, name: r.name || '', category: r.category || '', createdAt: r.created_at }; });
    var editors;
    if (gerentesRes.error) {
      editors = (eRes.data || []).map(function(r) { return { id: r.id, name: r.name || '', specialty: r.specialty || '', email: r.email || '', createdAt: r.created_at }; });
    } else {
      editors = mergeCreativosEditorsWithGerentes(gerentesRes.data || [], eRes.data || [], projRes.data || []);
    }
    var projects = (projRes.data || []).map(function(r) {
      return {
        id: r.id,
        name: r.name || '',
        clientId: r.client_id,
        productId: r.product_id,
        editorId: r.editor_id,
        type: r.type || '',
        platform: r.platform || '',
        format: r.format || '',
        brief: r.brief || '',
        stages: r.stages && typeof r.stages === 'object' ? r.stages : createStageData(),
        cpa: r.cpa || 'pendiente',
        published: r.published === true,
        createdAt: r.created_at,
        entregaEnteredAt: r.entrega_entered_at || null
      };
    });
    return { clients: clients, products: products, editors: editors, projects: projects };
  }).catch(function(err) { console.error('[Creativos] loadCreativosData:', err); return null; });
}

function reloadCreativosData(then) {
  if (!supabase) { if (then) then(); return Promise.resolve(); }
  return loadCreativosData().then(function(data) {
    if (data) {
      D.clients = data.clients;
      D.products = data.products;
      D.editors = data.editors;
      D.projects = data.projects;
    }
    return backfillEntregaEnteredAtIfMissing();
  }).then(function() {
    return purgeExpiredEntregaProjects();
  }).then(function() {
    if (then) then();
  });
}

      clientId: D.clients[t.client].id,
      productId: D.products[t.product].id,
      editorId: D.editors[t.editor].id,
      type: t.type,
      platform: t.platform,
      format: t.format,
      brief: `Brief para el proyecto ${t.name}. Descripción detallada del concepto creativo y objetivos de producción.`,
      stages: stages,
      cpa: t.cpa,
      published: t.published,
      createdAt: randomDate(45),
    };
    D.projects.push(p);
  });

  // Generate activity log from projects
  D.projects.forEach(p => {
    activityLog.push({ type:'created', projectName: p.name, date: p.createdAt });
    STAGES.forEach(s => {
      if (p.stages[s].status === 'approved') {
        activityLog.push({ type:'approved', projectName: p.name, stageName: STAGE_NAMES[s], date: p.stages[s].reviewedAt || p.createdAt });
      }
    });
  });
  activityLog.sort((a,b) => new Date(b.date) - new Date(a.date));
  activityLog = activityLog.slice(0, 20);
}

/* ============================================
   THEME TOGGLE
   ============================================ */
(function() {
  const root = document.documentElement;
  let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    updateThemeIcon();
  });
  function updateThemeIcon() {
    const btn = document.getElementById('themeToggle');
    btn.innerHTML = theme === 'dark'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.setAttribute('aria-label', theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');

})();

/* ============================================
   NAVIGATION
   ============================================ */
function navigateTo(page) {
  if (page === 'portfolio') { page = 'dashboard'; }
  window.location.hash = '';
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });

  const titles = { dashboard:'Panel', pipeline:'Pipeline', projects:'Proyectos', clients:'Clientes', products:'Productos', editors:'Equipo', analytics:'Analíticas' };
  document.getElementById('headerTitle').textContent = titles[page] || 'Panel';

  // Show skeleton briefly
  const main = document.getElementById('mainContent');
  main.innerHTML = renderSkeleton(page);
  setTimeout(() => renderPage(page), 150);

  // Close mobile sidebar
  closeMobileSidebar();
}

function renderSkeleton(page) {
  if (page === 'dashboard' || page === 'analytics') {
    return `<div class="stats-grid">${'<div class="skeleton skeleton-card"></div>'.repeat(4)}</div><div class="skeleton skeleton-card" style="height:200px;"></div>`;
  }
  if (page === 'pipeline') {
    return `<div style="display:flex;gap:var(--space-4);">${'<div style="flex:1;min-width:260px;"><div class="skeleton skeleton-card" style="height:400px;"></div></div>'.repeat(5)}</div>`;
  }
  return `${'<div class="skeleton skeleton-row"></div>'.repeat(6)}`;
}

function renderPage(page) {
  const main = document.getElementById('mainContent');
  switch(page) {
    case 'dashboard': main.innerHTML = renderDashboard(); break;
    case 'pipeline': main.innerHTML = renderPipeline(); initPipelineDrag(); break;
    case 'projects': main.innerHTML = renderProjectsList(); break;
    case 'clients': main.innerHTML = renderClients(); break;
    case 'products': main.innerHTML = renderProducts(); break;
    case 'editors': main.innerHTML = renderEditors(); break;
    case 'analytics': main.innerHTML = renderAnalytics(); break;
    default: main.innerHTML = renderDashboard();
  }
  // Animate counters
  setTimeout(animateCounters, 50);
  setTimeout(animateBarCharts, 100);
  updateNavBadges();
}

function getActivityText(a) {
  switch(a.type) {
    case 'created': return `<strong>${esc(a.projectName)}</strong> fue creado`;
    case 'approved': return `<strong>${esc(a.stageName)}</strong> aprobada en <strong>${esc(a.projectName)}</strong>`;
    case 'review': return `<strong>${esc(a.projectName)}</strong> enviado a revisión`;
    case 'changes': return `Cambios solicitados en <strong>${esc(a.projectName)}</strong>`;
    default: return '';
  }
}

function getStatusBadge(status) {
  switch(status) {
    case 'pending': return 'badge-muted';
    case 'in_progress': return 'badge-blue';
    case 'in_review': return 'badge-warning';
    case 'approved': return 'badge-green';
    case 'changes': return 'badge-red';
    default: return 'badge-muted';
  }
}

var _pipelineDrag = {
  active: false,
  projectId: null,
  sourceStage: null,
  ghostEl: null,
  cardEl: null,
  grabX: 0,
  grabY: 0
};
function initPipelineDrag() {
  var board = document.getElementById('pipelineKanban');
  if (!board || board.dataset.dragInited === '1') return;
  board.dataset.dragInited = '1';
  window._pipelineJustDropped = false;
  function getBoard() { return document.getElementById('pipelineKanban'); }
  function removeGhost() {
    if (_pipelineDrag.ghostEl && _pipelineDrag.ghostEl.parentNode) {
      _pipelineDrag.ghostEl.parentNode.removeChild(_pipelineDrag.ghostEl);
    }
    _pipelineDrag.ghostEl = null;
    _pipelineDrag.cardEl = null;
    document.body.classList.remove('kanban-pipeline-dragging');
  }
  function positionGhost(clientX, clientY) {
    var g = _pipelineDrag.ghostEl;
    if (!g) return;
    var x = clientX - _pipelineDrag.grabX;
    var y = clientY - _pipelineDrag.grabY;
    g.style.transform = 'translate3d(' + x + 'px,' + y + 'px,0) rotate(2.5deg) scale(1.03)';
  }
  function startDrag(card, e) {
    var id = card.getAttribute('data-project-id');
    if (!id) return;
    var colEl = card.closest('.kanban-column');
    if (!colEl) return;
    var clientX = e.clientX;
    var clientY = e.clientY;
    if (e.touches && e.touches[0]) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    }
    var rect = card.getBoundingClientRect();
    _pipelineDrag.active = true;
    _pipelineDrag.projectId = id;
    _pipelineDrag.sourceStage = colEl.getAttribute('data-stage');
    _pipelineDrag.grabX = clientX - rect.left;
    _pipelineDrag.grabY = clientY - rect.top;
    _pipelineDrag.cardEl = card;
    card.classList.add('kanban-card-dragging');
    var ghost = card.cloneNode(true);
    ghost.classList.remove('kanban-card-dragging');
    ghost.classList.add('kanban-card-drag-ghost');
    ghost.setAttribute('aria-hidden', 'true');
    ghost.style.width = rect.width + 'px';
    ghost.style.transform = 'translate3d(' + rect.left + 'px,' + rect.top + 'px,0) rotate(2.5deg) scale(1.03)';
    document.body.appendChild(ghost);
    _pipelineDrag.ghostEl = ghost;
    document.body.classList.add('kanban-pipeline-dragging');
    positionGhost(clientX, clientY);
  }
  function updateTarget(clientX, clientY) {
    pipelineDragMoved = true;
    positionGhost(clientX, clientY);
    var colEl = document.elementFromPoint(clientX, clientY);
    if (!colEl) return;
    colEl = colEl.closest('.kanban-column');
    var b = getBoard();
    if (b) b.querySelectorAll('.kanban-column').forEach(function(c) { c.classList.remove('kanban-drop-target'); });
    if (colEl) colEl.classList.add('kanban-drop-target');
  }
  var pipelineDragMoved = false;
  function endDrag(clientX, clientY) {
    if (!_pipelineDrag.active) return;
    var b = getBoard();
    var colEl = null;
    if (b) {
      colEl = b.querySelector('.kanban-drop-target');
      if (!colEl && clientX != null && clientY != null) {
        colEl = document.elementFromPoint(clientX, clientY);
        if (colEl) colEl = colEl.closest('.kanban-column');
      }
    }
    if (b) {
      b.querySelectorAll('.kanban-column').forEach(function(c) { c.classList.remove('kanban-drop-target'); });
      b.querySelectorAll('.kanban-card-dragging').forEach(function(c) { c.classList.remove('kanban-card-dragging'); });
    }
    removeGhost();
    var didMove = false;
    if (colEl && _pipelineDrag.projectId) {
      var targetStage = (colEl.getAttribute('data-stage') || '').trim();
      if (targetStage && STAGES.indexOf(targetStage) >= 0 && targetStage !== _pipelineDrag.sourceStage) {
        moveProjectToStage(_pipelineDrag.projectId, targetStage);
        window._pipelineJustDropped = true;
        didMove = true;
      }
    }
    if (!didMove && _pipelineDrag.projectId && !pipelineDragMoved) {
      openProjectDrawer(_pipelineDrag.projectId);
    }
    _pipelineDrag.active = false;
    _pipelineDrag.projectId = null;
    _pipelineDrag.sourceStage = null;
    pipelineDragMoved = false;
  }
  board.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    if (e.target.closest('.kanban-card-delete')) return;
    var card = e.target.closest('.kanban-card');
    if (!card) return;
    pipelineDragMoved = false;
    startDrag(card, e);
    e.preventDefault();
  });
  board.addEventListener('touchstart', function(e) {
    if (e.target.closest('.kanban-card-delete')) return;
    var card = e.target.closest('.kanban-card');
    if (!card) return;
    pipelineDragMoved = false;
    startDrag(card, e);
  }, { passive: true });
  if (!window._pipelineDragDocListeners) {
    window._pipelineDragDocListeners = true;
    document.addEventListener('mousemove', function(e) {
      if (!_pipelineDrag.active) return;
      updateTarget(e.clientX, e.clientY);
    });
    document.addEventListener('touchmove', function(e) {
      if (!_pipelineDrag.active || !e.touches.length) return;
      e.preventDefault();
      updateTarget(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    document.addEventListener('mouseup', function(e) {
      endDrag(e.clientX, e.clientY);
    });
    document.addEventListener('touchend', function(e) {
      endDrag(e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : null, e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : null);
    });
    document.addEventListener('touchcancel', function(e) {
      endDrag(e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : null, e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : null);
    });
  }
  board.addEventListener('click', function(e) {
    if (e.target.closest('.kanban-card-delete')) return;
    var card = e.target.closest('.kanban-card');
    if (card) {
      if (window._pipelineJustDropped) {
        window._pipelineJustDropped = false;
        e.preventDefault();
        e.stopPropagation();
        return;
      }
      var id = card.getAttribute('data-project-id');
      if (id) openProjectDrawer(id);
      return;
    }
    var noteBtn = e.target.closest('.kanban-col-note-btn');
    if (noteBtn) {
      e.preventDefault();
      e.stopPropagation();
      var stage = (noteBtn.getAttribute('data-stage') || '').trim();
      if (stage && STAGES.indexOf(stage) >= 0) openStageNoteModal(stage);
    }
  });
}

function moveProjectToStage(projectId, newStage) {
  var p = D.projects.find(function(pr) { return pr.id === projectId; });
  if (!p || !STAGES.includes(newStage)) return;
  var prevStages = JSON.parse(JSON.stringify(p.stages));
  var idx = STAGES.indexOf(newStage);
  STAGES.forEach(function(st, i) {
    if (i < idx) p.stages[st].status = 'approved';
    else if (i === idx) p.stages[st].status = 'in_progress';
    else p.stages[st].status = 'pending';
  });
  showToast('success', 'Proyecto movido a ' + (STAGE_NAMES[newStage] || newStage));
  if (supabase) {
    updateProjectStages(projectId, p.stages, true, prevStages);
  } else {
    renderPage('pipeline');
  }
}

/* ============================================

function renderAnalytics() {
  const completedProjects = D.projects.filter(p => p.cpa !== 'pendiente');
  const muyBueno = completedProjects.filter(p => p.cpa === 'muy_bueno').length;
  const bueno = completedProjects.filter(p => p.cpa === 'bueno').length;
  const malo = completedProjects.filter(p => p.cpa === 'malo').length;
  const winRate = completedProjects.length > 0 ? Math.round((muyBueno + bueno) / completedProjects.length * 100) : 0;
  const circumference = 2 * Math.PI * 50;
  const offset = circumference - (winRate / 100) * circumference;

  // Platform breakdown
  const platformCounts = {};
  D.projects.forEach(p => { platformCounts[p.platform] = (platformCounts[p.platform]||0) + 1; });
  const platforms = Object.entries(platformCounts).sort((a,b)=>b[1]-a[1]);
  const maxPlatform = platforms.length > 0 ? platforms[0][1] : 1;
  const platformColors = ['','green','blue','purple','teal','warning'];

  // Editor ranking
  const editorStats = D.editors.map(e => {
    const projects = D.projects.filter(p => p.editorId === e.id);
    const done = projects.filter(p => p.cpa !== 'pendiente');
    const good = done.filter(p => p.cpa==='muy_bueno'||p.cpa==='bueno').length;
    const rate = done.length > 0 ? Math.round(good / done.length * 100) : 0;
    return { ...e, total: projects.length, completed: done.length, rate };
  }).sort((a,b)=>b.rate-a.rate);

  return `<div class="page-view">

        </div>
        <div class="stat-value counter-animate" data-target="${bueno}">0</div>
        <div class="stat-label">Buenos</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg></div>
        </div>
        <div class="stat-value counter-animate" data-target="${malo}">0</div>
        <div class="stat-label">Malos</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div>
        </div>
        <div class="stat-value counter-animate" data-target="${completedProjects.length}">0</div>

    </div>

    <div class="analytics-grid">
      <div class="analytics-card" style="text-align:center;">
        <h3>Tasa de Éxito Global</h3>
        <div class="win-rate-ring">
          <svg viewBox="0 0 120 120">
            <circle class="track" cx="60" cy="60" r="50"/>
            <circle class="fill" cx="60" cy="60" r="50" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>

          <span><span style="color:var(--color-success);font-weight:600;">${muyBueno + bueno}</span> Positivos</span>
          <span><span style="color:var(--color-error);font-weight:600;">${malo}</span> Negativos</span>
        </div>
      </div>

      <div class="analytics-card">
        <h3>Distribución por Plataforma</h3>
        <div class="bar-chart">
          ${platforms.map((p,i) => `<div class="bar-chart-item">
            <div class="bar-chart-label"><span>${esc(p[0])}</span><span>${p[1]} proyectos</span></div>

function normalizeStageAttachFile(f) {
  if (f == null) return { fileName: '', filePath: null };
  if (typeof f === 'string') return { fileName: f, filePath: null };
  return {
    fileName: (f.fileName != null ? String(f.fileName) : (f.name != null ? String(f.name) : '')) || '',
    filePath: f.filePath || null,
    previewDataUrl: (typeof f.previewDataUrl === 'string' && f.previewDataUrl) ? f.previewDataUrl : null,
    previewKind: (typeof f.previewKind === 'string' && f.previewKind) ? f.previewKind : null
  };
}
function canCreativosStorageRead() {
  return !!(supabase && (marketingStorageActive() || typeof supabase.storage !== 'undefined'));
}
function getCreativosEntregablesSignedUrl(filePath, ttlSec, cb) {
  if (!filePath || !supabase) { cb(null); return; }
  var ttl = ttlSec || 3600;
  if (marketingStorageActive()) {
    marketingStorageSignReadUrl('creativos_entregables', filePath, ttl).then(function(u) {
      cb(u || null);
    }).catch(function(err) {
      console.error('[Creativos] sign url (marketing storage) error:', { filePath: filePath, ttl: ttl, err: err });
      cb(null);
    });
    return;
  }
  supabase.storage.from('creativos_entregables').createSignedUrl(filePath, ttl).then(function(r) {
    cb((r.data && r.data.signedUrl) || null);
  }).catch(function(err) {
    console.error('[Creativos] sign url (supabase storage) error:', { filePath: filePath, ttl: ttl, err: err });
    cb(null);
  });
}
function openCreativosFilePreview(fileName, filePath, previewDataUrl, previewKind) {

      var offlineFooter = '<button type="button" class="btn btn-secondary" onclick="closeModal()">Cerrar</button>';
      openModal('Vista previa · ' + esc(fileName || 'archivo'), offlineBody, offlineFooter);
      var modalOffline = document.querySelector('#modalOverlay .modal');
      if (modalOffline) modalOffline.classList.add('modal-preview');
      return;
    }
    if ((previewKind || '').toLowerCase() === 'pdf') {
      var pdfBody = '<div class="ref-preview-media" style="padding:20px"><div class="ref-preview-icon-slot" style="width:180px;height:220px;margin:0 auto">' + refPreviewIconHtml('pdf') + '</div></div><p class="form-hint" style="text-align:center;margin:10px 0 0 0">PDF sin copia en servidor. Esta tarjeta queda como referencia visual.</p>';
      var pdfFooter = '<button type="button" class="btn btn-secondary" onclick="closeModal()">Cerrar</button>';
      openModal('Vista previa · ' + esc(fileName || 'archivo'), pdfBody, pdfFooter);

  }

      body = '<div class="creativos-preview-img-wrap"><img src="' + escAttr(url) + '" alt=""></div>';
    } else if (/(\.mp4|\.webm|\.ogg|\.mov|\.m4v)$/i.test(lower)) {
      body = '<video class="creativos-preview-video" controls preload="metadata" src="' + escAttr(url) + '"></video>';
    } else if (/\.pdf$/i.test(lower)) {
      body = '<iframe class="creativos-preview-iframe" title="PDF" src="' + escAttr(url) + '"></iframe>';
    } else {

    }

      console.error('[Creativos] preview modal error, fallback to new tab:', e);

}
function downloadCreativosFileByPath(fileName, filePath) {
  if (!filePath) { showToast('error', 'Archivo no disponible'); return; }
  if (!canCreativosStorageRead()) { showToast('error', 'No hay acceso al almacenamiento'); return; }
  getCreativosEntregablesSignedUrl(filePath, 120, function(url) {
    if (!url) {
      console.error('[Creativos] download failed: signed URL null', { fileName: fileName, filePath: filePath });
      showToast('error', 'No se pudo generar el enlace');
      return;
    }
    downloadBySignedUrl(fileName, url);
  });
}
function triggerBrowserDownload(fileName, href) {
  var a = document.createElement('a');
  a.href = href;
  a.setAttribute('download', fileName || 'archivo');
  a.rel = 'noopener';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
function downloadBySignedUrl(fileName, url) {
  // Force a real browser download (blob) so images do not open in a new tab.
  fetch(url, { credentials: 'omit' }).then(function(res) {
    if (!res.ok) throw new Error('http_' + res.status);
    return res.blob();
  }).then(function(blob) {
    var blobUrl = URL.createObjectURL(blob);
    try {
      triggerBrowserDownload(fileName, blobUrl);
      setTimeout(function() {
        try { URL.revokeObjectURL(blobUrl); } catch (e) {}
      }, 5000);
    } catch (e) {
      console.error('[Creativos] blob download trigger error, fallback direct download attr:', e);
      triggerBrowserDownload(fileName, url);
    }
  }).catch(function(err) {
    console.error('[Creativos] blob download failed, fallback direct/new tab:', err);
    try {
      triggerBrowserDownload(fileName, url);
    } catch (e2) {
      console.error('[Creativos] direct download attr failed, fallback new tab:', e2);
      window.open(url, '_blank', 'noopener');
    }
  });
}
function stageAttachThumbInner(fileName, previewDataUrl, previewKind) {
  if (previewDataUrl && /^data:image\//i.test(previewDataUrl)) {
    return '<div class="stage-attach-thumb" style="padding:0;overflow:hidden"><img src="' + escAttr(previewDataUrl) + '" alt="" style="width:100%;height:100%;object-fit:cover;display:block"></div>';
  }
  if ((previewKind || '').toLowerCase() === 'pdf') {
    return '<div class="stage-attach-thumb">' + refPreviewIconHtml('pdf') + '</div>';
  }
  var fake = { name: fileName || '', type: '' };
  var info = classifyRefFile(fake);
  if (info.mode === 'image') return '<div class="stage-attach-thumb" style="background:linear-gradient(135deg,var(--color-primary-soft),var(--color-surface-dynamic))"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
  if (info.mode === 'video') return '<div class="stage-attach-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';
  return '<div class="stage-attach-thumb">' + refPreviewIconHtml(info.icon || 'file') + '</div>';
}
function compactFileDisplayName(name, atIso) {
  var original = String(name || 'archivo').trim();
  if (!original) return 'archivo';
  var dot = original.lastIndexOf('.');
  var ext = dot > 0 ? original.slice(dot + 1).toLowerCase() : '';
  var stem = dot > 0 ? original.slice(0, dot) : original;
  var monthMap = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var m = stem.match(/captura de pantalla\s+(\d{4})-(\d{2})-(\d{2})\s+(\d{2})(\d{2})(\d{2})/i);
  if (m) {
    var moIdx = Math.max(1, Math.min(12, parseInt(m[2], 10))) - 1;
    return 'cap_' + m[3] + monthMap[moIdx] + '_' + m[4] + '-' + m[5] + (ext ? '.' + ext : '');
  }
  var datePart = '';
  if (atIso) {
    var d = new Date(atIso);
    if (!isNaN(d.getTime())) {
      var da = String(d.getDate()).padStart(2, '0');
      var moShort = monthMap[d.getMonth()];
      datePart = '_' + da + moShort;
    }
  }
  var safe = stem
    .toLowerCase()
    .replace(/\s+/g, '_')
    .replace(/[^\w.-]/g, '')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '');
  if (!safe) safe = 'archivo';
  var maxStem = 20;
  if (safe.length > maxStem) safe = safe.slice(0, maxStem).replace(/_+$/g, '');
  return safe + datePart + (ext ? '.' + ext : '');
}

function uploadBlobToCreativosBucket(relPath, file, done) {
  if (supabase && marketingStorageActive()) {
    marketingStorageUpload('creativos_entregables', relPath, file, function(err) {
      done(err || null, err ? null : relPath);
    });
    return;
  }
  if (supabase && typeof supabase.storage !== 'undefined') {
    supabase.storage.from('creativos_entregables').upload(relPath, file, { upsert: false }).then(function(r) {
      done(r.error || null, r.error ? null : relPath);
    }).catch(function(e) { done(e, null); });
    return;
  }
  done(new Error('no_storage'), null);
}
function runSeriesInspiracionUploads(projectId, pendingEntries, onDone) {
  var results = [];
  var i = 0;
  function step() {
    if (i >= pendingEntries.length) {
      onDone(null, results);
      return;
    }
    var entry = pendingEntries[i];
    var f = entry && entry.file;
    if (!f) {
      results.push({
        fileName: String(entry && entry.name != null ? entry.name : 'archivo'),
        filePath: null,
        previewDataUrl: (entry && typeof entry.previewDataUrl === 'string') ? entry.previewDataUrl : null,
        previewKind: (entry && typeof entry.previewKind === 'string') ? entry.previewKind : null
      });
      i++;
      step();
      return;
    }
    var safe = (f.name || 'file').replace(/[^a-zA-Z0-9._-]/g, '_');
    var relPath = projectId + '/inspiracion/ref_' + i + '_' + Date.now() + '_' + safe;
    uploadBlobToCreativosBucket(relPath, f, function(err, pth) {
      results.push({
        fileName: f.name || 'archivo',
        filePath: pth,
        previewDataUrl: (entry && typeof entry.previewDataUrl === 'string') ? entry.previewDataUrl : null,
        previewKind: (entry && typeof entry.previewKind === 'string') ? entry.previewKind : null
      });
      i++;
      step();
    });
  }
  step();
}

        html += '<button type="button" class="btn btn-sm btn-primary" onclick="openDeliverablePreviewByIndex(\'' + p.id + '\',\'' + stage + '\',' + idx + ')">Ver</button>';
        html += '<button type="button" class="btn btn-sm btn-secondary" onclick="downloadDeliverableByIndex(\'' + p.id + '\',\'' + stage + '\',' + idx + ')">Descargar</button>';
      } else {
        html += '<span style="font-size:0.6rem;color:var(--color-text-faint)">Sin archivo en servidor</span>';
      }
      html += '</div></div></div>';
    });
    html += '</div>';
  }
  if (s.status !== 'pending' && s.status !== 'approved') {
    html += '<button type="button" class="btn btn-sm btn-primary" style="margin-top:var(--space-2);" onclick="document.getElementById(\'deliverableFileInput\').setAttribute(\'data-pid\',\'' + p.id + '\');document.getElementById(\'deliverableFileInput\').setAttribute(\'data-stage\',\'' + stage + '\');document.getElementById(\'deliverableFileInput\').click();">Subir versión</button>';
  }
  html += '</div>';
  return html;
}

function onDeliverableFileSelect(inp) {

function uploadDeliverableVersion(pid, stage, file) {
  var p = D.projects.find(function(pr) { return pr.id === pid; });
  if (!p) return;
  if (!p.stages[stage].deliverables) p.stages[stage].deliverables = [];
  var version = p.stages[stage].deliverables.length + 1;
  var fileName = file.name || 'archivo';
  var uploadedAt = new Date().toISOString();
  var uploadedBy = getCurrentUserName();
  var fileSize = file.size || 0;
  var filePath = null;
  var storagePath = pid + '/' + stage + '/v' + version + '_' + fileName.replace(/[^a-zA-Z0-9._-]/g, '_');
  if (supabase && marketingStorageActive()) {
    marketingStorageUpload('creativos_entregables', storagePath, file, function(err) {
      if (!err) filePath = storagePath;
      pushDeliverableAndSave(pid, stage, { version: version, fileName: fileName, filePath: filePath, fileSize: fileSize, uploadedAt: uploadedAt, uploadedBy: uploadedBy });
    });
    return;
  }
  if (supabase && typeof supabase.storage !== 'undefined') {
    var path = storagePath;
    supabase.storage.from('creativos_entregables').upload(path, file, { upsert: false }).then(function(r) {
      if (!r.error) filePath = path;
      pushDeliverableAndSave(pid, stage, { version: version, fileName: fileName, filePath: filePath, fileSize: fileSize, uploadedAt: uploadedAt, uploadedBy: uploadedBy });
    }).catch(function() {
      pushDeliverableAndSave(pid, stage, { version: version, fileName: fileName, filePath: null, fileSize: fileSize, uploadedAt: uploadedAt, uploadedBy: uploadedBy });
    });
  } else {
    pushDeliverableAndSave(pid, stage, { version: version, fileName: fileName, filePath: null, fileSize: fileSize, uploadedAt: uploadedAt, uploadedBy: uploadedBy });
  }
}
function pushDeliverableAndSave(pid, stage, obj) {
  var p = D.projects.find(function(pr) { return pr.id === pid; });
  if (!p) return;
  var prevStages = JSON.parse(JSON.stringify(p.stages));
  p.stages[stage].deliverables.push(obj);
  showToast('success', 'Versión ' + obj.version + ' registrada');
  if (supabase) { updateProjectStages(pid, p.stages, false, prevStages); } else { openProjectDrawer(pid); renderPage(currentPage); }

}

function renderStageActions(p, stage, stageIdx) {

function updateProjectStages(pid, stages, skipOpenDrawer, prevStages) {
  if (supabase) {
    var payload = { stages: stages };
    if (prevStages) {
      var prevRow = D.projects.find(function(pr) { return pr.id === pid; });
      var prevAt = prevRow && prevRow.entregaEnteredAt ? prevRow.entregaEnteredAt : null;
      payload.entrega_entered_at = computeEntregaEnteredAtForTransition(prevStages, stages, prevAt);
    }
    supabase.from('creativos_proyectos').update(payload).eq('id', pid).then(function(r) {
      if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
      reloadCreativosData(function() {
        if (!skipOpenDrawer) openProjectDrawer(pid);
        renderPage(currentPage);

  }

function submitRequestChanges(pid, stage) {
  var ta = document.getElementById('requestChangesTextarea');
  var note = ta && ta.value.trim();
  if (!note) { showToast('error', 'Escribe qué cambios se necesitan'); return; }
  closeModal();
  var p = D.projects.find(function(pr) { return pr.id === pid; });
  if (!p) return;
  var prevStages = JSON.parse(JSON.stringify(p.stages));
  p.stages[stage].status = 'changes';
  p.stages[stage].reviewNote = note;
  p.stages[stage].reviewedAt = new Date().toISOString();
  var dels = p.stages[stage].deliverables;
  if (dels && dels.length > 0) {
    var last = dels[dels.length - 1];
    last.rejectedBy = getCurrentUserName();
    last.rejectedAt = new Date().toISOString();
    last.rejectionNote = note;
  }
  logActivity('changes', p.name, STAGE_NAMES[stage]);

function formatRefFileSize(n) {
  if (n == null || isNaN(n)) return '';
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(n < 10240 ? 1 : 0) + ' KB';
  return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + ' MB';
}
function classifyRefFile(file) {
  var t = (file.type || '').toLowerCase();
  var name = file.name || '';
  if (t.indexOf('image/') === 0) return { label: 'Imagen', mode: 'image' };
  if (t.indexOf('video/') === 0) return { label: 'Video', mode: 'video' };
  if (t.indexOf('audio/') === 0) return { label: 'Audio', mode: 'icon', icon: 'audio' };
  if (t === 'application/pdf' || /\.pdf$/i.test(name)) return { label: 'PDF', mode: 'icon', icon: 'pdf' };
  if (/\.(zip|rar|7z)$/i.test(name)) return { label: 'Comprimido', mode: 'icon', icon: 'zip' };
  if (/\.(doc|docx|txt|rtf)$/i.test(name) || /word|officedocument|text\/plain/i.test(t)) return { label: 'Documento', mode: 'icon', icon: 'doc' };
  if (/\.(ppt|pptx)$/i.test(name) || /presentation/i.test(t)) return { label: 'Presentación', mode: 'icon', icon: 'slide' };
  if (/\.(xls|xlsx|csv)$/i.test(name) || /spreadsheet/i.test(t)) return { label: 'Hoja', mode: 'icon', icon: 'sheet' };
  var ext = (name.split('.').pop() || '').toUpperCase();
  return { label: ext || 'Archivo', mode: 'icon', icon: 'file' };
}

function renderRefPreviewMedia(entry, info) {

  if (info.mode === 'image' && url) {

function ensurePdfJsReady(cb) {
  if (window.pdfjsLib) { cb(window.pdfjsLib); return; }
  if (window._pdfJsLoadingQueue) { window._pdfJsLoadingQueue.push(cb); return; }
  window._pdfJsLoadingQueue = [cb];
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
  s.async = true;
  s.onload = function() {
    var lib = window.pdfjsLib || window['pdfjs-dist/build/pdf'] || null;
    if (lib && lib.GlobalWorkerOptions) {
      lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    }
    var q = window._pdfJsLoadingQueue || [];
    window._pdfJsLoadingQueue = null;
    q.forEach(function(fn) { try { fn(lib); } catch (e) {} });
  };
  s.onerror = function() {
    var q = window._pdfJsLoadingQueue || [];
    window._pdfJsLoadingQueue = null;
    q.forEach(function(fn) { try { fn(null); } catch (e) {} });
  };
  document.head.appendChild(s);
}
function generateVideoPreviewDataUrl(file, done) {
  try {
    var url = URL.createObjectURL(file);
    var v = document.createElement('video');
    v.preload = 'metadata';
    v.muted = true;
    v.playsInline = true;
    v.src = url;
    var finished = false;
    function finish(dataUrl) {
      if (finished) return;
      finished = true;
      try { URL.revokeObjectURL(url); } catch (e) {}
      done(dataUrl || null);
    }
    v.onloadeddata = function() {
      try {
        var w = Math.max(1, Math.min(640, v.videoWidth || 320));
        var h = Math.max(1, Math.round((v.videoHeight || 180) * (w / Math.max(1, (v.videoWidth || 320)))));
        var c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        var ctx = c.getContext('2d');
        ctx.drawImage(v, 0, 0, w, h);
        finish(c.toDataURL('image/jpeg', 0.82));
      } catch (e) { finish(null); }
    };
    v.onerror = function() { finish(null); };
    setTimeout(function() { finish(null); }, 2500);
  } catch (e) { done(null); }
}
function generatePdfPreviewDataUrl(file, done) {
  ensurePdfJsReady(function(lib) {
    if (!lib) { done(null); return; }
    try {
      var fr = new FileReader();
      fr.onload = function() {
        try {
          var bytes = new Uint8Array(fr.result);
          lib.getDocument({ data: bytes }).promise.then(function(pdf) {
            return pdf.getPage(1);
          }).then(function(page) {
            var vp = page.getViewport({ scale: 1 });
            var targetW = 420;
            var scale = targetW / Math.max(1, vp.width);
            var viewport = page.getViewport({ scale: scale });
            var canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            var ctx = canvas.getContext('2d');
            return page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
              done(canvas.toDataURL('image/jpeg', 0.85));
            });
          }).catch(function() { done(null); });
        } catch (e) { done(null); }
      };
      fr.onerror = function() { done(null); };
      fr.readAsArrayBuffer(file);
    } catch (e) { done(null); }
  });
}
function handleFileDrop(e) { handleFileSelect(e.dataTransfer.files); }
function handleFileSelect(files) {
  Array.from(files || []).forEach(function(file) {
    var entry = { file: file, objectUrl: null, previewDataUrl: null, previewKind: null };
    var t = (file.type || '').toLowerCase();
    if (t.indexOf('image/') === 0 || t.indexOf('video/') === 0) {
      try { entry.objectUrl = URL.createObjectURL(file); } catch (err) {}
    }
    if (t.indexOf('image/') === 0 && (file.size || 0) > 0 && (file.size || 0) <= 4 * 1024 * 1024) {
      entry.previewKind = 'image';
      try {
        var reader = new FileReader();
        reader.onload = function() {
          if (typeof reader.result === 'string') {
            entry.previewDataUrl = reader.result;
            renderFileList();
          }
        };
        reader.readAsDataURL(file);
      } catch (e) {}
    }
    if (t.indexOf('video/') === 0 && (file.size || 0) <= 80 * 1024 * 1024) {
      entry.previewKind = 'video';
      generateVideoPreviewDataUrl(file, function(dataUrl) {
        if (typeof dataUrl === 'string' && dataUrl) {
          entry.previewDataUrl = dataUrl;
          renderFileList();
        }
      });
    }
    if ((t === 'application/pdf' || /\.pdf$/i.test(file.name || '')) && (file.size || 0) <= 15 * 1024 * 1024) {
      entry.previewKind = 'pdf';
      generatePdfPreviewDataUrl(file, function(dataUrl) {
        if (typeof dataUrl === 'string' && dataUrl) {
          entry.previewDataUrl = dataUrl;
          renderFileList();
        }
      });
    }
    pendingFiles.push(entry);
  });
  var inp = document.getElementById('fileInput');
  if (inp) inp.value = '';
  renderFileList();
}
function renderFileList() {
  var fl = document.getElementById('fileList');
  var wrap = document.getElementById('refPreviewsWrap');
  var cnt = document.getElementById('refPreviewsCount');
  if (!fl) return;
  if (pendingFiles.length === 0) {
    fl.innerHTML = '';
    if (wrap) { wrap.classList.remove('ref-previews-wrap--visible'); }
    if (cnt) cnt.textContent = 'Ninguno';
    return;
  }
  if (wrap) wrap.classList.add('ref-previews-wrap--visible');
  if (cnt) {
    var n = pendingFiles.length;
    cnt.textContent = n === 1 ? '1 archivo' : (n + ' archivos');
  }
  fl.innerHTML = pendingFiles.map(function(entry, i) {
    var file = entry.file;
    var info = classifyRefFile(file);
    var shown = compactFileDisplayName(file.name || 'Sin nombre');
    var sizeStr = formatRefFileSize(file.size);
    return '<div class="ref-preview-card">' +
      '<button type="button" class="ref-preview-remove" onclick="removePendingRefFile(' + i + ')" title="Quitar archivo" aria-label="Quitar">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' +
      renderRefPreviewMedia(entry, info) +
      '<div class="ref-preview-body">' +
      '<div class="ref-preview-name" title="' + escAttr(file.name || 'Sin nombre') + '">' + esc(shown) + '</div>' +
      '<div class="ref-preview-meta"><span class="ref-preview-kind">' + esc(info.label) + '</span>' + (sizeStr ? '<span>' + esc(sizeStr) + '</span>' : '') + '</div>' +
      '</div></div>';
  }).join('');
}
function removePendingRefFile(i) {
  var entry = pendingFiles[i];
  if (entry && entry.objectUrl) {
    try { URL.revokeObjectURL(entry.objectUrl); } catch (e) {}
  }
  pendingFiles.splice(i, 1);
  renderFileList();
}

function saveProject() {
  var name = document.getElementById('projName').value.trim();
  if (!name) { showToast('error', 'El nombre es requerido'); return; }
  var productId = document.getElementById('projProduct').value || null;
  var rawEditor = document.getElementById('projEditor').value || null;
  if (D.products.length > 0 && !productId) { showToast('error', 'Selecciona un producto'); return; }
  if (creativosProjectEditorSelectHasChoices() && !rawEditor) {
    showToast('error', 'Selecciona un responsable del equipo');
    return;
  }
  if (D.products.length === 0 || !creativosProjectEditorSelectHasChoices()) {
    showToast('info', 'Crea productos y asegúrate de tener miembros en Asistencia (gerentes) para asignarlos.');
  }
  var stages = createStageData();
  if (pendingFiles.length > 0) {
    stages.inspiracion.files = pendingFiles.map(function(x) {
      if (x && x.file) {
        return {
          fileName: x.file.name || 'archivo',
          filePath: null,
          previewDataUrl: (typeof x.previewDataUrl === 'string') ? x.previewDataUrl : null,
          previewKind: (typeof x.previewKind === 'string') ? x.previewKind : null
        };
      }
      return String(x);
    });
  }
  var clientId = document.getElementById('projClient').value || null;
  function doInsertProyecto(editorUuid) {
    var row = {
      name: name,
      client_id: clientId || null,
      product_id: productId || null,
      editor_id: editorUuid || null,
      type: document.getElementById('projType').value || '',
      platform: document.getElementById('projPlatform').value || '',
      format: document.getElementById('projFormat').value || '',
      brief: document.getElementById('projBrief').value || '',
      stages: stages,
      cpa: 'pendiente',
      published: false
    };
    if (supabase) {
      supabase.from('creativos_proyectos').insert(row).select('id').single().then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al crear proyecto'); return; }
        var newId = r.data && r.data.id;
        var uploadQueue = pendingFiles.filter(function(x) { return x && x.file; });
        function finishSuccess() {
          revokePendingFilePreviews();
          pendingFiles = [];
          closeModal();
          showToast('success', 'Proyecto creado');
          reloadCreativosData(function() { renderPage(currentPage); });
        }
        if (!newId || uploadQueue.length === 0) {
          finishSuccess();
          return;
        }
        runSeriesInspiracionUploads(newId, uploadQueue, function(_err, results) {
          var nextStages = JSON.parse(JSON.stringify(row.stages));
          nextStages.inspiracion.files = (results || []).map(function(x) {
            return {
              fileName: x.fileName,
              filePath: x.filePath || null,
              previewDataUrl: (typeof x.previewDataUrl === 'string') ? x.previewDataUrl : null,
              previewKind: (typeof x.previewKind === 'string') ? x.previewKind : null
            };
          });
          supabase.from('creativos_proyectos').update({ stages: nextStages }).eq('id', newId).then(function(up) {
            if (up.error) console.warn('[Creativos] actualizar rutas de inspiración:', up.error);
            finishSuccess();
          });
        });
      });
    } else {
      var p = {
        id: uid(), name: name,
        clientId: clientId, productId: productId, editorId: editorUuid || null,
        type: row.type, platform: row.platform, format: row.format, brief: row.brief,
        stages: stages, cpa: 'pendiente', published: false,
        createdAt: new Date().toISOString()
      };
      D.projects.push(p);
      revokePendingFilePreviews();
      pendingFiles = [];
      logActivity('created', p.name);
      closeModal();
      showToast('success', 'Proyecto creado');
      renderPage(currentPage);
    }
  }
  if (rawEditor && rawEditor.indexOf('gerente:') === 0) {
    var edPick = D.editors.find(function(e) { return e.id === rawEditor; });
    if (!edPick || !edPick.email) { showToast('error', 'Miembro no encontrado o sin correo'); return; }
    if (supabase) {
      supabase.from('creativos_editores').insert({
        name: (edPick.name || 'Equipo').trim(),
        email: edPick.email.trim(),
        specialty: (edPick.specialty && String(edPick.specialty).trim()) || 'Equipo / asistencia',
        gerente_id: edPick.gerenteId || null
      }).select('id').single().then(function(ins) {
        if (ins.error || !ins.data) {
          showToast('error', (ins.error && ins.error.message) || 'No se pudo registrar el editor');
          return;
        }
        doInsertProyecto(ins.data.id);
      });
      return;
    }
    var newEd = {
      id: uid(),
      name: (edPick.name || 'Equipo').trim(),
      email: edPick.email.trim(),
      specialty: (edPick.specialty && String(edPick.specialty).trim()) || 'Equipo / asistencia',
      gerenteId: edPick.gerenteId,
      fromGerente: true,
      createdAt: new Date().toISOString()
    };
    D.editors.push(newEd);
    doInsertProyecto(newEd.id);
    return;
  }
  doInsertProyecto(rawEditor);
}

  var phone = (document.getElementById('clientPhone') && document.getElementById('clientPhone').value) ? document.getElementById('clientPhone').value.trim() : '';
  var contactName = (document.getElementById('clientContactName') && document.getElementById('clientContactName').value) ? document.getElementById('clientContactName').value.trim() : '';

  var row = { name: name, company: company, email: email || null, phone: phone || null, contact_name: contactName || null, notes: notes || null };
  if (supabase) {
    if (editingId) {
      var linkedCreditoId = (function() {

      })();

          closeModal();
          reloadCreativosData(function() { renderPage(currentPage); });
        }

          doneOk();
          return;

        /* Lista en Creativos toma nombre/empresa/email desde Crédito si hay credito_client_id; hay que actualizar ambas tablas. */
        supabase.from('clientes').update({
          name: name,
          biz: company || null,
          emails: email ? [email] : [],
          phones: phone ? [phone] : [],

        }).eq('id', linkedCreditoId).then(function(r2) {

            return;
          }
          doneOk();
        });
      });

        if (r.error) { showToast('error', (r.error.message || 'Error al guardar') + '. Si no puedes editar, verifica permisos de gerente.'); return; }
        showToast('success', 'Editor actualizado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    } else {
      supabase.from('creativos_editores').insert({ name: name, specialty: specialty, email: email || null }).then(function(r) {
        if (r.error) { showToast('error', (r.error.message || 'Error al agregar') + '. Si no puedes agregar editores, verifica que tu usuario tenga permisos de gerente.'); return; }
        showToast('success', 'Editor agregado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    }
  } else {
    if (editingId) {
      var e = D.editors.find(function(ed) { return ed.id === editingId; });
      if (e) { e.name = name; e.specialty = specialty; e.email = email; }
      showToast('success', 'Editor actualizado');
    } else {
      D.editors.push({ id: uid(), name: name, specialty: specialty, email: email, createdAt: new Date().toISOString() });
      showToast('success', 'Editor agregado');
    }
    closeModal(); renderPage(currentPage);
  }
}

/* ============================================
   TOAST SYSTEM
   ============================================ */
function showToast(type, message, duration = 3500) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;

  const icons = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
  };

  toast.innerHTML = `
    <div class="toast-icon">${icons[type] || icons.info}</div>
    <div class="toast-message">${esc(message)}</div>
    <div class="toast-progress" style="width:100%;"></div>
  `;

  container.appendChild(toast);
  requestAnimationFrame(() => {
    toast.classList.add('show');
    const progress = toast.querySelector('.toast-progress');
    progress.style.transitionDuration = duration + 'ms';
    requestAnimationFrame(() => { progress.style.width = '0%'; });
  });

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 350);
  }, duration);
}

/* ============================================
   UTILITY FUNCTIONS
   ============================================ */
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/** Una sola línea para selects: evita "Juan — Juan" o "Nombre — " cuando falta la segunda parte. */
function formatSelectTwoPart(first, second, emptyLabel) {
  var a = (first != null ? String(first) : '').trim();
  var b = (second != null ? String(second) : '').trim();
  var empty = emptyLabel != null ? emptyLabel : '—';
  if (!a && !b) return esc(empty);
  if (!b || a.toLowerCase() === b.toLowerCase()) return esc(a || b);
  if (!a) return esc(b);
  return esc(a) + ' — ' + esc(b);
}

function escAttr(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function creativosProjectEditorSelectHasChoices() {
  return D.editors.length > 0;
}

function editorAssignOptionLabel(e) {
  if (e.email) return esc(e.name || e.email) + ' — ' + esc(e.email);
  return formatSelectTwoPart(e.name, e.specialty, 'Sin nombre');
}

function renderProjectEditorSelectHTML(selectedId) {

  html += '</optgroup>';

}

function animateCounters() {
  document.querySelectorAll('.counter-animate[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target);
    const suffix = el.dataset.suffix || '';
    const duration = 800;
    const start = performance.now();
    function step(ts) {
      const elapsed = ts - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(eased * target) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

/* ============================================
   KEYBOARD SHORTCUTS
   ============================================ */
document.addEventListener('keydown', function(e) {
  // Esc closes modals/drawers
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('active')) { closeModal(); return; }
    if (document.getElementById('projectDrawer').classList.contains('active')) { closeDrawer(); return; }
    if (document.getElementById('sidebar').classList.contains('open')) { closeMobileSidebar(); return; }
  }
  // Don't trigger shortcuts if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  // / for search
  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('globalSearch').focus();
  }
  // N for new project
  if (e.key === 'n' || e.key === 'N') {
    if (!document.getElementById('modalOverlay').classList.contains('active')) {
      e.preventDefault();
      openNewProjectModal();
    }
  }
});

    if (!f) return;
    var em = (window.__creativosSessionEmail || '').trim();
    if (!supabase || !em) {
      var r = new FileReader();
      r.onload = function() {
        try { localStorage.setItem(key, r.result); } catch (e) {}
        hmPrepareSidebarAvatarImg(imgEl, '');
        imgEl.src = r.result;
        imgEl.style.display = 'block';
        iniEl.style.display = 'none';
        try { creativosRefreshPhotoHint(); } catch (e) {}
      };
      r.readAsDataURL(f);
      inp.value = '';
      return;
    }
    if (f.size > 5 * 1024 * 1024) {
      alert('La imagen no puede superar 5 MB.');
      inp.value = '';
      return;
    }
    uploadGerenteAvatarForEmail(em, f, function(url) {
      if (!url) {
        alert('No se pudo subir la foto. Revisá el bucket avatars en Supabase.');
        return;
      }
      try {
        localStorage.setItem(key, url);
        localStorage.setItem('holistic_gerente_avatar_url', url);
        localStorage.setItem('hm_gerente_avatar_url', url);
        localStorage.setItem('tareas_avatar_url', url);
      } catch (e0) {}
      if (window.__creativosGerenteSelfRow && String(window.__creativosGerenteSelfRow.email || '').toLowerCase().trim() === em) {
        window.__creativosGerenteSelfRow.avatar_url = url;
      }
      imgEl.onerror = function() { imgEl.style.display = 'none'; iniEl.style.display = ''; try { creativosRefreshPhotoHint(); } catch (e) {} };
      imgEl.onload = function() { imgEl.style.display = 'block'; iniEl.style.display = 'none'; try { creativosRefreshPhotoHint(); } catch (e) {} };
      hmPrepareSidebarAvatarImg(imgEl, url);
      imgEl.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 't=' + Date.now();
      supabase.from('gerentes').update({ avatar_url: url }).eq('email', em).then(function(up) {
        if (up.error) console.warn('[Creativos] gerentes avatar_url:', up.error);
      });
    });
    inp.value = '';
  };
  var block = document.querySelector('.sidebar-footer-user');
  if (block) block.addEventListener('click', function(e) { if (!e.target.closest('.theme-toggle-btn')) inp.click(); });
}

if (!window.__hmHolisticAvatarStorageListenerCreativos) {
  window.__hmHolisticAvatarStorageListenerCreativos = true;
  window.addEventListener('storage', function(ev) {
    if (!ev.key || (ev.key !== 'holistic_gerente_avatar_url' && ev.key !== 'hm_gerente_avatar_url')) return;
    try {
      applyCreativosSidebarAvatarFromGerente();
    } catch (eSt) {}
  });
}
(function wireHolisticNameGateCreativos() {
  var gBtn = document.getElementById('holisticNameGateSave');
  var gInp = document.getElementById('holisticNameGateInput');
  if (gBtn) gBtn.addEventListener('click', submitHolisticNameGateCreativos);
  if (gInp) gInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); submitHolisticNameGateCreativos(); } });
})();

window.__creativosTriggerLoad = doCreativosInitialLoad;
if (supabase) {
  doCreativosInitialLoad();
} else {
  initApp();
  var t = setInterval(function() { if (supabase) { clearInterval(t); doCreativosInitialLoad(); } }, 400);
  setTimeout(function() { clearInterval(t); }, 8000);
}
initCreativosAvatar();
function promptUserNameCreativos() {
  var cur = getStoredHolisticUserName() || '';
  var hint = isBadHolisticDisplayName(cur) ? '' : cur;
  var n = prompt('Tu nombre (aparece en "Revisado por" y en las notas):', hint);
  if (n == null) return;
  var t = n.trim();
  if (!t || isBadHolisticDisplayName(t)) {
    alert('Indicá un nombre válido (mínimo 2 caracteres; no «Usuario»).');
    return;
  }
  saveHolisticUserDisplayNameCreativos(t, function() {
    updateCreativosUserNameDisplay();
    showToast('success', 'Nombre actualizado');
  });
}
function updateCreativosUserNameDisplay() {
  try { applyCreativosSidebarAvatarFromGerente(); } catch (e) {}
  var roleL = document.getElementById('creativosUserRoleLabel');
  if (roleL) roleL.textContent = creativosSidebarRoleBadgeText(window.__creativosGerenteSelfRow);
  var el = document.getElementById('creativosUserName');
  var name = getCurrentUserName();
  var titleName = getResolvedHolisticDisplayTitleNameCreativos();
  if (el) {
    el.textContent = name;
    el.onclick = function() { promptUserNameCreativos(); };
    el.title = isBadHolisticDisplayName(getStoredHolisticUserName()) && !titleName
      ? 'Completá tu nombre (te lo pedimos al entrar)'
      : 'Clic para cambiar tu nombre (Revisado por y notas)';
  }
  var titleEl = document.getElementById('pageTitle');
  if (titleEl) titleEl.textContent = titleName ? ('Creativos · ' + titleName) : 'Creativos Holistic';
  var iniEl = document.getElementById('creativosUserAvatarIniciales');
  var imgEl = document.getElementById('creativosUserAvatarImg');
  if (iniEl && imgEl && imgEl.style.display !== 'block') {
    var L = (titleName || name || '').trim();
    iniEl.textContent = L.length ? L.charAt(0).toUpperCase() : '·';
  }
  try { creativosRefreshPhotoHint(); } catch (e) {}
}
updateCreativosUserNameDisplay();

/* Recordatorios (Creativos) */
var RECORDATORIOS_KEY = 'creativos_recordatorios';
function getRecordatoriosCreativos() {
  try { var r = localStorage.getItem(RECORDATORIOS_KEY); return r ? JSON.parse(r) : []; } catch (e) { return []; }
}
function saveRecordatoriosCreativos(arr) {
  try { localStorage.setItem(RECORDATORIOS_KEY, JSON.stringify(arr)); } catch (e) {}
  renderRecordatoriosCreativos();
  var badge = document.getElementById('recordatoriosBadge');
  if (badge) { var n = arr.filter(function(x) { return !x.done; }).length; badge.textContent = n > 0 ? n : ''; badge.dataset.count = n; }
}
function toggleRecordatoriosPanel() {
  var p = document.getElementById('recordatoriosPanel');
  if (p) { p.classList.toggle('open'); if (p.classList.contains('open')) { renderRecordatoriosCreativos(); document.getElementById('recordatoriosInput').focus(); } }
}
function addRecordatorioCreativos() {
  var inp = document.getElementById('recordatoriosInput');
  var text = inp && inp.value.trim();
  if (!text) return;
  var list = getRecordatoriosCreativos();
  list.unshift({ id: Date.now().toString(36), text: text, when: new Date().toISOString(), done: false });
  saveRecordatoriosCreativos(list);
  inp.value = '';
}
function removeRecordatorioCreativos(id) {
  var list = getRecordatoriosCreativos().filter(function(r) { return r.id !== id; });
  saveRecordatoriosCreativos(list);
}
function toggleRecordatorioDoneCreativos(id) {
  var list = getRecordatoriosCreativos();
  var r = list.find(function(x) { return x.id === id; });
  if (r) { r.done = !r.done; saveRecordatoriosCreativos(list); }
}
function renderRecordatoriosCreativos() {
  var ul = document.getElementById('recordatoriosList');
  if (!ul) return;
  var list = getRecordatoriosCreativos();
  ul.innerHTML = list.length === 0 ? '<li style="padding:var(--space-4);color:var(--color-text-faint);font-size:var(--text-sm)">Sin recordatorios. Agrega uno arriba.</li>' : list.map(function(r) {
    return '<li class="recordatorios-item' + (r.done ? ' done' : '') + '">' +
      '<span class="recordatorios-item-text" onclick="toggleRecordatorioDoneCreativos(\'' + r.id + '\')" role="button" tabindex="0">' + esc(r.text) + '</span>' +
      '<button type="button" class="recordatorios-item-del" onclick="removeRecordatorioCreativos(\'' + r.id + '\')" title="Eliminar">×</button></li>';
  }).join('');
  var badge = document.getElementById('recordatoriosBadge');
  if (badge) { var n = list.filter(function(x) { return !x.done; }).length; badge.textContent = n > 0 ? n : ''; badge.dataset.count = n; }
}
renderRecordatoriosCreativos();
</script>
